    .kfhb { display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation;transition:opacity .15s; }

    .kfhb-blu { background:#2563eb;color:#fff; }
    .kfhb-grn { background:#16a34a;color:#fff; }

    /* Form kaydet/yükle modal — global (giriş durumundan bağımsız) */
    .kfm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9997;display:none;align-items:center;justify-content:center;}
    .kfm-box{background:#fff;border-radius:14px;padding:22px 24px;min-width:300px;max-width:680px;width:97%;box-shadow:0 8px 40px rgba(0,0,0,0.22);}
    .kfm-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:14px;}
    .kfm-input{width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:14px;}
    .kfm-input:focus{border-color:#dc2626;}
    .kfm-btns{display:flex;gap:8px;justify-content:flex-end;}
    .kfm-ok{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .kfm-cancel{background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .kfm-export{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    .kfm-export:hover{background:#15803d;}
    .kfm-export:disabled{opacity:0.5;cursor:not-allowed;}
    .kfm-list{max-height:min(420px,58vh);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
    .kfm-item{display:flex;align-items:center;gap:10px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:9px;padding:10px 12px;cursor:pointer;transition:background .12s,border-color .12s;flex-shrink:0;}
    .kfm-item-info{flex:1;min-width:0;}
    .kfm-item-name{font-size:13px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .kfm-item-meta{font-size:10px;color:#6b7280;font-weight:600;margin-top:2px;}
    .kfm-del{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit;}
    .kfm-empty{text-align:center;color:#9ca3af;font-size:13px;padding:24px 0;}
    .kfm-group{border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;flex-shrink:0;width:100%;}
    .kfm-group-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#f3f4f6;cursor:pointer;user-select:none;gap:8px;width:100%;box-sizing:border-box;}
    .kfm-group-hdr:hover{background:#e5e7eb;}
    .kfm-group-name{font-size:13px;font-weight:800;color:#111827;letter-spacing:.02em;flex:1;min-width:0;}
    .kfm-group-count{font-size:10px;font-weight:700;color:#6b7280;background:#e5e7eb;border-radius:20px;padding:2px 8px;flex-shrink:0;}
    .kfm-group-chevron{font-size:12px;color:#6b7280;transition:transform .18s;flex-shrink:0;transform:rotate(-90deg);}
    .kfm-group.open .kfm-group-chevron{transform:rotate(0deg);}
    .kfm-group-body{display:none;flex-direction:column;gap:0;border-top:1.5px solid #e5e7eb;background:#fff;}
    .kfm-group.open .kfm-group-body{display:flex;}
    .kfm-group-body .kfm-item{border-radius:0;border:none;border-bottom:1px solid #f0f0f0;background:#fff;}
    .kfm-group-body .kfm-item:last-child{border-bottom:none;}
    .kfm-group-empty{padding:14px 12px;font-size:12px;color:#9ca3af;text-align:center;font-style:italic;}
    /* Not modalı — global (sayfa yenilenmesinden etkilenmesin) */
    .kfnm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10050;display:none;align-items:center;justify-content:center;padding:12px;box-sizing:border-box;}
    .kfnm-box{background:#fff;border-radius:14px;width:min(860px,97vw);max-height:min(92dvh,92vh);display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.25);overflow:hidden;}
    .kfnm-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 20px 10px;}
    .kfnm-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:10px;display:flex;align-items:center;gap:8px;}

    .kfnm-cols{display:flex;gap:14px;margin-bottom:4px;}
    @media(max-width:768px){.kfnm-cols{flex-direction:column;gap:16px;}}

    .kfnm-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b7280;}
    .kfnm-lbl-red{color:#dc2626;}
    .kfnm-lbl-blu{color:#2563eb;}
    .kfnm-list{flex:1;min-height:120px;max-height:220px;overflow-y:auto;border:1.5px solid #e5e7eb;border-radius:8px;padding:6px;display:flex;flex-direction:column;gap:3px;background:#fafafa;-webkit-overflow-scrolling:touch;}

    .kfnm-item-del{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;font-family:inherit;margin-top:-1px;touch-action:manipulation;}
    .kfnm-item-del:hover{color:#dc2626;}
    .kfnm-empty{color:#d1d5db;font-size:12px;text-align:center;padding:24px 0;font-style:italic;}
    .kfnm-add-row{display:flex;gap:6px;margin-top:2px;}
    .kfnm-inp{flex:1;border:1.5px solid #d1d5db;border-radius:7px;padding:7px 10px;font-size:16px;font-family:inherit;outline:none;box-sizing:border-box;touch-action:manipulation;}
    .kfnm-inp:focus{border-color:#dc2626;}
    .kfnm-add-btn{border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;touch-action:manipulation;}
    .kfnm-add-btn-r{background:#dc2626;color:#fff;} .kfnm-add-btn-r:hover{background:#b91c1c;}
    .kfnm-add-btn-b{background:#2563eb;color:#fff;} .kfnm-add-btn-b:hover{background:#1d4ed8;}
    .kfnm-mic{border:none;border-radius:7px;padding:7px 10px;font-size:15px;cursor:pointer;background:#f3f4f6;color:#6b7280;transition:background .15s,color .15s;flex-shrink:0;touch-action:manipulation;}
    .kfnm-mic:hover{background:#e5e7eb;color:#374151;}
    .kfnm-mic.listening{background:#fef2f2;color:#dc2626;animation:kfnm-pulse 0.8s ease-in-out infinite;}
    @keyframes kfnm-pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.35);}50%{box-shadow:0 0 0 5px rgba(220,38,38,0);}}
    .kfnm-btns{display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;padding:12px 20px calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid #e5e7eb;background:#fff;box-shadow:0 -4px 14px rgba(0,0,0,0.05);}
    .kfnm-ok{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;min-height:44px;}
    .kfnm-ok:hover{background:#15803d;}
    .kfnm-cancel{background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;min-height:44px;}
    .kfnm-cancel:hover{background:#e5e7eb;}
    @media(max-width:768px){
      .kfnm-overlay{align-items:flex-end;padding:0;}
      .kfnm-box{width:100%;max-width:100%;border-radius:16px 16px 0 0;max-height:94dvh;}
      .kfnm-body{padding:16px 16px 8px;}
      .kfnm-list{max-height:100px;min-height:64px;flex:none;}
      .kfnm-btns{gap:10px;padding:14px 16px calc(16px + env(safe-area-inset-bottom,0px));margin-top:0;}
      .kfnm-cancel,.kfnm-ok{flex:1;padding:13px 16px;font-size:15px;}
      .kfnm-mic,.kfnm-add-btn{min-height:44px;min-width:44px;}
    }
    .kfhb-note-badge{position:absolute;top:3px;right:3px;width:7px;height:7px;background:#16a34a;border-radius:50%;display:none;}
    #kf-toast-global{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:10060;max-width:92vw;text-align:center;}

  // Supabase JWT 401 alınırsa token'ı yenile ve isteği tekrar dene
  // 503 alınırsa (DB uyuyor) otomatik uyanma bekleyip retry yap
  async function _sbFetch(input, init, _wakeRetry) {
    _wakeRetry = _wakeRetry || 0;
    let r;
    try {
      r = await fetch(input, init);
    } catch(e) {
      throw e;
    }
    // 503: Supabase projesi uyuyor — uyanmasını bekle ve tekrar dene
    if (r.status === 503 && _wakeRetry < 4) {
      const waitMs = [5000, 10000, 20000, 30000][_wakeRetry];
      const waitSec = waitMs / 1000;
      khSyncStatus('waking');
      khToast('⏳ Veritabanı uyandırılıyor... (' + waitSec + 'sn bekleniyor)', waitMs + 2000);
      console.warn('[KaliteX] Supabase 503 — ' + waitSec + 'sn sonra tekrar deneniyor (deneme ' + (_wakeRetry + 1) + '/4)');
      await new Promise(res => setTimeout(res, waitMs));
      return _sbFetch(input, init, _wakeRetry + 1);
    }
    // 401: Token yenile ve tekrar dene
    if (r.status === 401 && currentUser) {
      const ok = await authRefreshToken();
      if (ok) {
        const newHeaders = sbH(init.headers?.Prefer ? { 'Prefer': init.headers.Prefer } : {});
        r = await fetch(input, { ...init, headers: newHeaders });
      }
    }
    return r;
  }

  async function sbGetAll(tbl, qs, pageSize = 1000) {
    // Supabase PostgREST sunucu limiti 1000 — Range header ile sayfalama yaparak tümünü çek
    // _sbFetch kullanılarak 503 (DB uyuyor) retry mantığından yararlanır
    let all = [], offset = 0;
    while (true) {
      const rangeEnd = offset + pageSize - 1;
      const r = await _sbFetch(SB_URL + '/rest/v1/' + tbl + (qs ? '?' + qs : ''), {
        headers: sbH({ 'Range': `${offset}-${rangeEnd}`, 'Range-Unit': 'items' })
      });
      if (!r.ok) throw new Error(await r.text());
      const chunk = await r.json();
      if (!chunk.length) break;
      all = all.concat(chunk);
      if (chunk.length < pageSize) break; // son sayfa
      offset += pageSize;
    }
    return all;
  }

  function khGetLocalKodOrder() {
    const order = [];
    for (let ri = 0; ri < KH.TOTAL_ROWS; ri++) {

      if (kod && kod !== KH_ORDER_KOD) order.push(kod);

  function khApplyKodOrder(params) {
    const real = params.filter(p => p.kod !== KH_ORDER_KOD);
    const orderRow = params.find(p => p.kod === KH_ORDER_KOD);
    let order = [];
    if (orderRow?.aciklama) {
      try {
        const parsed = JSON.parse(orderRow.aciklama);
        if (Array.isArray(parsed)) order = parsed.filter(k => k && k !== KH_ORDER_KOD);
      } catch (e) { /* id sırasına düş */ }
    }
    const map = new Map(real.map(p => [p.kod, p]));
    const sorted = [];
    const used = new Set();
    order.forEach(kod => {
      if (map.has(kod)) { sorted.push(map.get(kod)); used.add(kod); }
    });
    real.filter(p => !used.has(p.kod)).sort((a, b) => a.id - b.id).forEach(p => sorted.push(p));
    return sorted;
  }

  let _khSyncing = false;
  async function khSyncToSupabase() {
    if (!navigator.onLine) { khSyncStatus('offline'); return false; }
    if (_khSyncing) { console.warn('[KaliteX] Sync zaten çalışıyor, atlandı'); return false; }
    _khSyncing = true;
    khSyncStatus('syncing');

    const _syncNow = new Date().toISOString();

    try {
      // ── ADIM 0: Sunucudaki mevcut durumu çek (Pull → Merge → Push) ───────────
      // Bu olmadan cihaz A'ın eklediği verileri cihaz B'nin sync'i siliyordu.
      // Her cihaz yalnızca kendi bildiği verileri "tek gerçek" sanıyordu.
      const [serverParams, serverAtama] = await Promise.all([
        sbGetAll('kalite_parametreleri', 'order=id.asc'),
        sbGetAll('model_atama', 'select=model_id,parametre_kod')
      ]);

      // ── ADIM 1: Parametreleri Merge et ve UPSERT et ───────────────────────────
      // Local satır sırasını koru — yeni eklenen maddeler en alta gitmesin
      const deletedKodlar = khGetDeletedKodlar();
      const deletedSet = new Set(deletedKodlar);
      const serverReal = serverParams.filter(p => p.kod !== KH_ORDER_KOD);
      const serverOrderRow = serverParams.find(p => p.kod === KH_ORDER_KOD);
      const localKodSet = new Set();
      const mergedParams = [];

      for (let ri = 0; ri < KH.TOTAL_ROWS; ri++) {
        const r = KH.paramData[ri];
        if (!r || !r[0] || r[0] === KH_ORDER_KOD || deletedSet.has(r[0])) continue;
        localKodSet.add(r[0]);
        mergedParams.push({
          kod: r[0], alan_turu: r[1]||'', uzunluk: r[2]||'', desimal: r[3]||'',
          aciklama: r[4]||'', grup: r[5]||'', grup_kodu: r[6]||'', updated_at: _syncNow
        });
      }

      const serverOnly = serverReal.filter(p => !localKodSet.has(p.kod) && !deletedSet.has(p.kod));
      if (serverOnly.length) {
        let serverOrder = [];
        if (serverOrderRow?.aciklama) {
          try {
            const parsed = JSON.parse(serverOrderRow.aciklama);
            if (Array.isArray(parsed)) serverOrder = parsed;
          } catch (e) { /* yoksay */ }
        }
        serverOnly.sort((a, b) => {
          const ia = serverOrder.indexOf(a.kod), ib = serverOrder.indexOf(b.kod);
          if (ia === -1 && ib === -1) return a.id - b.id;
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        });
        serverOnly.forEach(p => {
          mergedParams.push({
            kod: p.kod, alan_turu: p.alan_turu||'', uzunluk: p.uzunluk||'', desimal: p.desimal||'',
            aciklama: p.aciklama||'', grup: p.grup||'', grup_kodu: p.grup_kodu||'',
            updated_at: p.updated_at || _syncNow
          });
        });
      }

      const finalOrder = mergedParams.map(p => p.kod);
      mergedParams.push(khBuildOrderRow(finalOrder, _syncNow));
      for (let i = 0; i < mergedParams.length; i += 100)
        await sbUpsert('kalite_parametreleri', mergedParams.slice(i, i + 100), 'kod');

      // ── ADIM 2: Kasıtlı silinen parametreleri Supabase'den sil ───────────────
      // "local'de olmayan her şeyi sil" YERİNE sadece bu cihazda açıkça silinen
      // kodları sil. Bu sayede diğer cihazın eklediği veriler korunur.
      if (deletedKodlar.length > 0 && deletedKodlar.length <= 300) {
        await sbDel('kalite_parametreleri', 'kod=in.(' + deletedKodlar.join(',') + ')');
      }

      // ── ADIM 3: Model atamalarını Merge et ve yaz ─────────────────────────────
      // Server atamalarını model bazında grupla
      const serverAtamaByModel = new Map();
      serverAtama.forEach(a => {
        if (!serverAtamaByModel.has(a.model_id)) serverAtamaByModel.set(a.model_id, new Set());
        serverAtamaByModel.get(a.model_id).add(a.parametre_kod);
      });

      // Her model için: server atamaları ∪ local atamaları → kayıp olmaz
      for (const [mid, obj] of Object.entries(KH.assignments)) {
        const localKodlar = new Set();
        for (const ri of Object.keys(obj)) {
          const kod = KH.paramData[Number(ri)]?.[0];
          if (kod) localKodlar.add(kod);
        }
        const serverKodlar = serverAtamaByModel.get(mid) || new Set();
        // Birleşim: her iki cihazın atamalarını koru
        const merged = new Set([...serverKodlar, ...localKodlar]);
        // Bu modelde kasıtlı kaldırılanları çıkar
        const deletedAtama = khGetDeletedAtama(mid);
        deletedAtama.forEach(k => merged.delete(k));

        await sbDel('model_atama', 'model_id=eq.' + mid);
        if (merged.size > 0) {
          const rows = [...merged].map(kod => ({ model_id: mid, parametre_kod: kod }));
          for (let i = 0; i < rows.length; i += 200)
            await sbPost('model_atama', rows.slice(i, i + 200));
        }
      }

      // ── ADIM 4: Merge edilmiş veriyi tekrar çek → belleği güncelle ──────────
      await khLoadFromSupabase();

      // ── ADIM 5: Silme kayıtlarını temizle, güncel halini belleğe al ────────
      khClearDeletedKodlar();
      khClearDeletedAtama();
      KH._dirty = false;
      khSyncStatus('ok');
      console.log(`[KaliteX] Sync tamamlandı: ${mergedParams.length} parametre`);
      return true;

    } catch(e) {
      khSyncStatus('error');
      console.error('[KaliteX] Supabase sync hatası:', e.message || e);
      khToast('⚠️ Supabase yazma hatası: ' + (e.message||e), 4000);
      return false;
    } finally {
      _khSyncing = false;
    }
  }

  // CSV sütun adı → KH_MODELS ID eşleşme tablosu
  const KH_CSV_MAP = {
    'LYM950':'lym-950','LYM1150':'lym-1150','LYM1350':'lym-1350','LYM1500':'lym-1500',
    'VDL2500':'vdl-2500','VDL3500':'vdl-3500','VDL4250':'vdl-4250','VDL5500':'vdl-5500','VDL6500':'vdl-6500',
    'KBN1B1650':'kbn-1b-1650','KBN1B1850':'kbn-1b-1850','KBN1B2050':'kbn-1b-2050',
    'KBN2B1650':'kbn-2b-1650','KBN2B1850':'kbn-2b-1850','KBN2B2050':'kbn-2b-2050',
    'ULT40':'ult-m40','ULT60':'ult-m60','ULT80':'ult-m80','ULT100':'ult-m100','ULT140':'ult-m140',
    'PYT40':'pyt-40','PYT90':'pyt-90','PYT750':'pyt-750','PYT800':'pyt-800',
    'MSTPRO02':'mst-pro-02','LVB60':'mts-lvb-60','LVB100':'mst-lvb-100',
    'RTS2B':'rts-346-2b','RTS4B':'rts-346-4b','ULT400':'ult-m400-1b-l',
    'KNV303000':'knv-30-3000-2b','KNV604250':'knv-60-4250-1b','KNV606000':'knv-60-6000-2b',
  };

  function khImportCSV() {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.csv,.txt';
    inp.onchange = () => {
      const f = inp.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = e => {
        try {
          const text = e.target.result;
          const allLines = text.split(/\r?\n/);
          // Başlık satırını bul (KOD ile başlayanı ara)
          let headerIdx = -1;
          for (let i = 0; i < Math.min(5, allLines.length); i++) {
            if (allLines[i].split(';')[0].trim().toUpperCase() === 'KOD') { headerIdx = i; break; }
          }
          if (headerIdx < 0) { alert('Başlık satırı (KOD) bulunamadı.'); return; }
          const headers = allLines[headerIdx].split(';').map(h => h.trim());
          // Model sütun indekslerini belirle
          const modelCols = {}; // colIdx -> mid
          headers.forEach((h, ci) => { if (KH_CSV_MAP[h]) modelCols[ci] = KH_CSV_MAP[h]; });
          // Veriyi sıfırla
          KH.paramData = [];
          KH_MODELS.forEach(m => { KH.assignments[m.id] = {}; });
          KH.TOTAL_ROWS = 500;
          for (let r = 0; r < KH.TOTAL_ROWS; r++) KH.paramData.push(new Array(KH_FIXED.length).fill(''));
          // Satırları parse et
          let rowIdx = 0;
          for (let li = headerIdx + 1; li < allLines.length && rowIdx < KH.TOTAL_ROWS; li++) {
            const ln = allLines[li];
            if (!ln.trim()) continue;
            const cols = ln.split(';');
            const kod = cols[0] ? cols[0].trim() : '';
            if (!kod || !kod.match(/^K\d/)) continue;
            KH.paramData[rowIdx][0] = kod;
            KH.paramData[rowIdx][1] = cols[1] ? cols[1].trim() : '';
            KH.paramData[rowIdx][2] = cols[2] ? cols[2].trim() : '';
            KH.paramData[rowIdx][3] = cols[3] ? cols[3].trim() : '';
            KH.paramData[rowIdx][4] = cols[4] ? cols[4].trim() : '';
            KH.paramData[rowIdx][5] = cols[5] ? cols[5].trim() : '';
            KH.paramData[rowIdx][6] = cols[6] ? cols[6].trim() : '';
            // Model atamaları
            Object.entries(modelCols).forEach(([ci, mid]) => {
              const v = cols[ci] ? cols[ci].trim().toUpperCase() : '';
              if (v === 'X') KH.assignments[mid][rowIdx] = 'X';
            });
            rowIdx++;
          }
          khBuildFR(); khVSR(); khSave();
          khToast(`CSV yüklendi: ${rowIdx} parametre ✓`, 2500);
        } catch(err) { alert('CSV okuma hatası: ' + err.message); }
      };
      rd.readAsText(f, 'UTF-8');
    };
    inp.click();
  }

  // ── Model data accessor (for model pages) ───────────────────
  function khGetModelParams(modelId) {
    const vals = KH.assignments[modelId] || {};
    return Object.keys(vals).map(Number).sort((a,b) => a-b).map(ri => ({
      rowIdx: ri,
      kod:       KH.paramData[ri][0] || '',
      alanTuru:  KH.paramData[ri][1] || '',
      uzunluk:   KH.paramData[ri][2] || '',
      desimal:   KH.paramData[ri][3] || '',
      aciklama:  KH.paramData[ri][4] || '',
      grup:      KH.paramData[ri][5] || '',
      grupKodu:  KH.paramData[ri][6] || '',
    }));
  }

  // ── Filtered rows ────────────────────────────────────────────
  function khBuildFR() {
    const rows = [];
    for (let r = 0; r < KH.TOTAL_ROWS; r++) {
      let ok = true;
      for (const [ci, val] of Object.entries(KH.filters)) {
        if (!val) continue;
        const c = parseInt(ci);
        const cv = c < KH_FIXED.length ? (KH.paramData[r][c] || '') : khMVal(KH_MODELS[c - KH_FIXED.length].id, r);
        if (!cv.toLowerCase().includes(val.toLowerCase())) { ok = false; break; }
      }
      if (ok) rows.push(r);
    }
    if (KH.sortState.col >= 0) {
      const sc = KH.sortState.col;
      rows.sort((a, b) => {
        let av, bv;
        if (sc < KH_FIXED.length) { av = (KH.paramData[a][sc]||'').toLowerCase(); bv = (KH.paramData[b][sc]||'').toLowerCase(); }
        else { const mid = KH_MODELS[sc - KH_FIXED.length].id; av = khMVal(mid, a).toLowerCase(); bv = khMVal(mid, b).toLowerCase(); }
        return KH.sortState.asc ? av.localeCompare(bv,'tr') : bv.localeCompare(av,'tr');
      });
    }
    KH.filteredRows = rows;
  }

  // ── Virtual scroll ───────────────────────────────────────────
  function khOnScroll() {
    const w = document.getElementById('kh-scroll'); if (!w) return;
    const st = w.scrollTop, vh = w.clientHeight;
    const start = Math.max(0, Math.floor(st / KH.ROW_H) - KH.BUFFER);
    const end = Math.min(KH.filteredRows.length - 1, Math.ceil((st + vh) / KH.ROW_H) + KH.BUFFER);
    if (start === KH.vsStart && end === KH.vsEnd) return;
    KH.vsStart = start; KH.vsEnd = end;
    khVSR();
  }

  function khVSR() {
    const tot = KH.filteredRows.length;
    const colSpan = khTC() + 2;
    const topH = KH.vsStart * KH.ROW_H;
    const botH = Math.max(0, (tot - KH.vsEnd - 1)) * KH.ROW_H;
    const { r1, c1, r2, c2 } = KH.sel;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);

    let html = `<tr><td colspan="${colSpan}" style="height:${topH}px;padding:0;border:none;"></td></tr>`;
    for (let vi = KH.vsStart; vi <= KH.vsEnd && vi < tot; vi++) {
      const ri = KH.filteredRows[vi];
      const rSel = KH.showSel && r1 >= 0 && ri >= minR && ri <= maxR;
      html += `<tr class="khr${rSel?' khra':''}" data-ri="${ri}">`;
      html += `<td class="khrn khrn-fr${rSel?' khrns':''}" data-ri="${ri}" onmousedown="khRND(event,${ri})">${ri+1}</td>`;
      for (let ci = 0; ci < KH_FIXED.length; ci++) {
        const v = KH.paramData[ri][ci] || '';
        const s = rSel && ci >= minC && ci <= maxC;
        const w5 = ci === 4 ? ' style="min-width:270px;"' : '';
        const ctr = (ci === 0 || ci === 1 || ci === 2 || ci === 3 || ci === 5 || ci === 6) ? ' khcv-c' : '';
        html += `<td class="khc${s?' khs':''}" data-ri="${ri}" data-ci="${ci}" onmousedown="khCD(event,${ri},${ci})" onmouseover="khCO(event,${ri},${ci})" ondblclick="khDD(event,${ri},${ci})"${w5}><div class="khcv${ctr}">${khEsc(v)}</div></td>`;
      }
      for (let mi = 0; mi < KH_MODELS.length; mi++) {
        const ci = KH_FIXED.length + mi;
        const xv = khMVal(KH_MODELS[mi].id, ri);
        const xs = rSel && ci >= minC && ci <= maxC;
        html += `<td class="khc${xs?' khs':''}" data-ri="${ri}" data-ci="${ci}" onmousedown="khCD(event,${ri},${ci})" onmouseover="khCO(event,${ri},${ci})" ondblclick="khDD(event,${ri},${ci})"><div class="khcv khcv-c">${khEsc(xv)}</div></td>`;
      }
      html += `<td style="min-width:30px;border:none;"></td></tr>`;
    }
    html += `<tr><td colspan="${colSpan}" style="height:${botH}px;padding:0;border:none;"></td></tr>`;
    document.getElementById('kh-tbody').innerHTML = html;
    const el = document.getElementById('kh-sc'); if (el) el.textContent = `${tot} / ${KH.TOTAL_ROWS} satır`;
  }

  // ── Header ───────────────────────────────────────────────────
  function khBuildHeader() {
    if (!document.getElementById('kh-thead')) return; // Sayfa henüz render edilmedi
    const ss = KH.sortState;
    // Fixed column min-widths (px) so label fits single line
    const fixedW = [80, 100, 90, 85, 270, 70, 90]; // KOD,ALAN TÜRÜ,UZUNLUK,DESİMAL,AÇIKLAMA,GRUP,GRUP KODU
    let h = `<tr>`;
    h += `<th class="khth khth-fr" style="z-index:22;">#</th>`;
    KH_FIXED.forEach((col, ci) => {
      const sorted = ss.col === ci;
      const fActive = !!KH.filters[ci];
      h += `<th class="khth" data-ci="${ci}" style="min-width:${fixedW[ci]}px;"><div class="khth-inner">`;
      h += `<span style="white-space:nowrap;">${col}</span>`;
      h += `<button class="khsb" onclick="khTS(${ci})" title="Sırala">${sorted?(ss.asc?'▲':'▼'):'⇅'}</button>`;
      h += `<button class="khfb${fActive?' khfb-on':''}" onclick="khOpenFilter(${ci})" title="Filtrele">▼</button>`;
      h += `</div></th>`;
    });
    KH_MODELS.forEach((m, mi) => {
      const ci = KH_FIXED.length + mi;
      const sorted = ss.col === ci;
      h += `<th class="khth khxth" data-ci="${ci}"><div class="khth-inner"><span style="white-space:nowrap;">${m.label}</span><button class="khsb" onclick="khTS(${ci})" title="Sırala">${sorted?(ss.asc?'▲':'▼'):'⇅'}</button></div></th>`;
    });
    h += `<th class="khth" style="min-width:30px;border:none;background:#dc2626;"></th></tr>`;
    document.getElementById('kh-thead').innerHTML = h;
  }

  // ── Full render ──────────────────────────────────────────────
  async function khRenderPage() {
    await khInit();
    khBuildFR();
    KH.vsStart = 0; KH.vsEnd = 60;
    const w = document.getElementById('kh-scroll');
    if (w) w.scrollTop = 0;
    khBuildHeader();
    khVSR();
  }

  // (X toggle removed — model columns are now plain text cells)

  // ── Selection ────────────────────────────────────────────────
  function khCD(e, ri, ci) {
    if (e.button !== 0) return;
    khCE(); KH.mousedown = true; KH.showSel = true;
    if (e.shiftKey && KH.sel.r1 >= 0) { KH.sel.r2 = ri; KH.sel.c2 = ci; }
    else KH.sel = { r1: ri, c1: ci, r2: ri, c2: ci };
    khSelUI();
    e.preventDefault();
  }

  function khCO(e, ri, ci) {
    if (!KH.mousedown) return;
    KH.sel.r2 = ri; KH.sel.c2 = ci;
    KH.showSel = true;
    khSelUI();
  }

  function khRND(e, ri) {
    khCE(); KH.showSel = true; KH.sel = { r1: ri, c1: 0, r2: ri, c2: khTC() - 1 };
    khSelUI(); e.preventDefault();
  }

  function khSelUI() {
    if (!KH.showSel) return;
    const { r1, c1, r2, c2 } = KH.sel; if (r1 < 0) return;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    document.querySelectorAll('.khc').forEach(td => {
      const ri = +td.dataset.ri, ci = +td.dataset.ci;
      td.classList.toggle('khs', ri >= minR && ri <= maxR && ci >= minC && ci <= maxC);
    });
    document.querySelectorAll('.khrn').forEach(td => {
      td.classList.toggle('khrns', +td.dataset.ri >= minR && +td.dataset.ri <= maxR);
    });
    document.querySelectorAll('.khr').forEach(tr => {
      tr.classList.toggle('khra', +tr.dataset.ri >= minR && +tr.dataset.ri <= maxR);
    });
  }

  // ── Edit ─────────────────────────────────────────────────────
  function khDD(e, ri, ci) {
    if (!isEditor()) return; // Salt okunur modda hücre düzenleme engellendi
    khCE();
    const cell = e.currentTarget;
    const val = ci < KH_FIXED.length ? (KH.paramData[ri][ci] || '') : khMVal(KH_MODELS[ci - KH_FIXED.length].id, ri);
    KH.editCell = { ri, ci, el: cell };
    cell.innerHTML = `<input class="khei" type="text" value="${khEsc(val)}">`;    
    KH.editEl = cell.querySelector('input');
    KH.editEl.focus(); KH.editEl.select();
    KH.editEl.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') { khCE(); ev.preventDefault(); }
      if (ev.key === 'Escape') { khCA(); ev.preventDefault(); }
      if (ev.key === 'Tab') {
        khCE();
        const nc = ci + (ev.shiftKey ? -1 : 1);
        if (nc >= 0 && nc < khTC()) setTimeout(() => {
          const n = document.querySelector(`.khc[data-ri="${ri}"][data-ci="${nc}"]`);
          if (n) khDD({ currentTarget: n, stopPropagation: () => {} }, ri, nc);
        }, 10);
        ev.preventDefault();
      }
    });
    KH.editEl.addEventListener('blur', () => setTimeout(khCE, 80));
    e.stopPropagation();
  }

  function khCE() {
    if (!KH.editCell || !KH.editEl) return;
    const { ri, ci, el } = KH.editCell;
    const v = KH.editEl.value;
    if (ci < KH_FIXED.length) KH.paramData[ri][ci] = v;
    else khMValSet(KH_MODELS[ci - KH_FIXED.length].id, ri, v);
    el.innerHTML = `<div class="khcv">${khEsc(v)}</div>`;
    KH.editCell = null; KH.editEl = null; KH._dirty = true;
  }

  function khCA() {
    if (!KH.editCell) return;
    const { ri, ci, el } = KH.editCell;
    const v = ci < KH_FIXED.length ? (KH.paramData[ri][ci]||'') : khMVal(KH_MODELS[ci - KH_FIXED.length].id, ri);
    el.innerHTML = `<div class="khcv">${khEsc(v)}</div>`;
    KH.editCell = null; KH.editEl = null;
  }

  // ── Copy / Cut / Paste ───────────────────────────────────────
  function khCopy() {
    const { r1, c1, r2, c2 } = KH.sel; if (r1 < 0) return;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    const rows = [];
    for (let r = minR; r <= maxR; r++) {
      const row = [];
      for (let c = minC; c <= maxC; c++) {
        row.push(c < KH_FIXED.length ? (KH.paramData[r][c]||'') : khMVal(KH_MODELS[c - KH_FIXED.length].id, r));
      }
      rows.push(row);
    }
    KH.clipboard = { data: rows };
    navigator.clipboard.writeText(rows.map(r => r.join('\t')).join('\n')).catch(() => {});
    khToast(`${(maxR-minR+1)*(maxC-minC+1)} hücre kopyalandı`);
  }

  function khPaste() {
    const doIt = rows => {
      if (KH.sel.r1 < 0) return;
      const sR = Math.min(KH.sel.r1, KH.sel.r2), sC = Math.min(KH.sel.c1, KH.sel.c2);
      rows.forEach((row, ri) => row.forEach((val, ci) => {
        const tr = sR + ri, tc = sC + ci;
        if (tr >= KH.TOTAL_ROWS || tc >= khTC()) return;
        if (tc < KH_FIXED.length) { KH.paramData[tr][tc] = val; }
        else { khMValSet(KH_MODELS[tc - KH_FIXED.length].id, tr, val); }
      }));
      KH._dirty = true; khVSR(); khToast('Yapıştırıldı');
    };
    if (KH.clipboard) { doIt(KH.clipboard.data); return; }
    navigator.clipboard.readText().then(t => { if (t) doIt(t.split('\n').map(r => r.split('\t'))); }).catch(() => {});
  }

  function khCut() {
    khCopy();
    const { r1, c1, r2, c2 } = KH.sel;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    for (let r = minR; r <= maxR; r++) for (let c = minC; c <= maxC; c++) {
      if (c < KH_FIXED.length) KH.paramData[r][c] = '';
      else khMValSet(KH_MODELS[c - KH_FIXED.length].id, r, '');
    }
    KH._dirty = true; khVSR();
  }

  function khDel() {
    const { r1, c1, r2, c2 } = KH.sel; if (r1 < 0) return;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);

    // Kasıtlı silme takibi: KOD sütunu (ci=0) siliniyorsa Supabase'deki kaydı da sil
    // Model atama sütunu siliniyorsa o modelin atamasını kaldır
    const deletedKodlar = [];
    const deletedAtamaByModel = {}; // mid → [kod, ...]
    for (let r = minR; r <= maxR; r++) {
      for (let c = minC; c <= maxC; c++) {
        if (c === 0 && KH.paramData[r][0]) {
          // KOD sütunu temizleniyor = satır siliniyor
          deletedKodlar.push(KH.paramData[r][0]);
        } else if (c >= KH_FIXED.length) {
          // Model atama sütunu temizleniyor
          const mid = KH_MODELS[c - KH_FIXED.length].id;
          const kod = KH.paramData[r][0];
          if (kod) {
            if (!deletedAtamaByModel[mid]) deletedAtamaByModel[mid] = [];
            deletedAtamaByModel[mid].push(kod);
          }
        }
        if (c < KH_FIXED.length) KH.paramData[r][c] = '';
        else khMValSet(KH_MODELS[c - KH_FIXED.length].id, r, '');
      }
    }
    if (deletedKodlar.length) khAddDeletedKodlar(deletedKodlar);
    for (const [mid, kodlar] of Object.entries(deletedAtamaByModel)) khAddDeletedAtama(mid, kodlar);

    KH._dirty = true; khVSR();
  }

  function khSelAll() { KH.showSel = true; KH.sel = { r1: 0, c1: 0, r2: KH.TOTAL_ROWS-1, c2: khTC()-1 }; khSelUI(); }

  // ── Filter / Sort ─────────────────────────────────────────────
  function khSF(ci, val) {
    if (val) KH.filters[ci] = val; else delete KH.filters[ci];
    KH.sel = { r1:-1, c1:-1, r2:-1, c2:-1 };
    khBuildFR(); KH.vsStart = 0; KH.vsEnd = 60;
    const w = document.getElementById('kh-scroll'); if (w) w.scrollTop = 0;
    khBuildHeader(); khVSR();
  }

  // ── Filter modal ────────────────────────────────────
  function khOpenFilter(ci) {
    const overlay = document.getElementById('kh-filter-modal');
    const colName = ci < KH_FIXED.length ? KH_FIXED[ci] : KH_MODELS[ci - KH_FIXED.length].label;
    const cur = KH.filters[ci] || '';
    overlay.innerHTML = `<div class="khfm-box" onclick="event.stopPropagation()">
      <div class="khfm-title">Filtre — ${colName}</div>
      <input id="khfm-inp" class="khfm-input" type="text" placeholder="Filtre değeri girin..." value="${khEsc(cur)}" autofocus>
      <div class="khfm-btns">
        <button class="khfm-clear" onclick="khClearFilter(${ci})">Temizle</button>
        <button class="khfm-ok" onclick="khApplyFilter(${ci})">Uygula</button>
      </div>
    </div>`;
    overlay.style.display = 'flex';
    setTimeout(() => { const inp = document.getElementById('khfm-inp'); if (inp) { inp.focus(); inp.select(); inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') khApplyFilter(ci); if (ev.key === 'Escape') khCloseFilter(); }); } }, 30);
  }

  function khApplyFilter(ci) {
    const inp = document.getElementById('khfm-inp');
    if (inp) khSF(ci, inp.value.trim());
    khCloseFilter();
  }

  function khClearFilter(ci) {
    khSF(ci, '');
    khCloseFilter();
  }

  function khCloseFilter() {
    const overlay = document.getElementById('kh-filter-modal');
    if (overlay) { overlay.style.display = 'none'; overlay.innerHTML = ''; }
  }

  function khTS(ci) {
    if (KH.sortState.col === ci) KH.sortState.asc = !KH.sortState.asc;
    else { KH.sortState.col = ci; KH.sortState.asc = true; }
    khBuildFR(); khBuildHeader(); khVSR();
  }

  // ── Add row (insert above selected row) ────────────────────
  function khAddRow() {
    if (KH.sel.r1 < 0) {
      khToast('Önce bir satır seçin — yeni satır seçili satırın üstüne eklenir', 3000);
      return;
    }
    const insertAt = Math.min(KH.sel.r1, KH.sel.r2);
    KH.TOTAL_ROWS++;
    KH.paramData.splice(insertAt, 0, new Array(KH_FIXED.length).fill(''));
    // Shift assignment row indices for rows at or after insertAt
    for (const [mid, obj] of Object.entries(KH.assignments)) {
      const newObj = {};
      for (const [ri, v] of Object.entries(obj)) {
        const n = +ri;
        newObj[n >= insertAt ? n + 1 : n] = v;
      }
      KH.assignments[mid] = newObj;
    }
    KH.sel = { r1: insertAt, c1: KH.sel.c1, r2: insertAt, c2: KH.sel.c2 };
    KH._dirty = true;
    khBuildFR(); khVSR();
    khScrollTo(insertAt);
    khToast('Satır eklendi ✓');
  }

  // ── Scroll cell into view ─────────────────────────────────────
  function khScrollTo(ri) {
    const w = document.getElementById('kh-scroll'); if (!w) return;
    const top = ri * KH.ROW_H;
    if (top < w.scrollTop) w.scrollTop = top;
    else if (top + KH.ROW_H > w.scrollTop + w.clientHeight) w.scrollTop = top + KH.ROW_H - w.clientHeight;
  }

  // ── Keyboard ─────────────────────────────────────────────────
  function khKeyDown(e) {
    if (currentPage !== 'kalite-havuzu') return;
    // Close filter modal on Escape
    const modal = document.getElementById('kh-filter-modal');
    if (modal && modal.style.display !== 'none') { if (e.key === 'Escape') khCloseFilter(); return; }
    // Don't intercept keystrokes typed into filter inputs or other non-edit inputs
    const ae = document.activeElement;
    if (ae && ae !== KH.editEl && (ae.tagName === 'INPUT' || ae.tagName === 'SELECT' || ae.tagName === 'TEXTAREA')) return;
    if (KH.editCell) return;
    const cmd = e.ctrlKey || e.metaKey;
    if (cmd && e.key === 'c') { khCopy(); e.preventDefault(); return; }
    if (cmd && e.key === 'v') { khPaste(); e.preventDefault(); return; }
    if (cmd && e.key === 'x') { khCut(); e.preventDefault(); return; }
    if (cmd && e.key === 'a') { khSelAll(); e.preventDefault(); return; }
    if (cmd && e.key === 's') { if (isEditor()) khSave(); e.preventDefault(); return; }
    if (e.key === 'F2' && KH.sel.r1 >= 0 && KH.sel.r1 === KH.sel.r2 && KH.sel.c1 === KH.sel.c2) {
      if (isEditor()) {
        const cell = document.querySelector(`.khc[data-ri="${KH.sel.r1}"][data-ci="${KH.sel.c1}"]`);
        if (cell) { khDD({ currentTarget: cell, stopPropagation: () => {} }, KH.sel.r1, KH.sel.c1); }
      }
      e.preventDefault(); return;
    }
    if (e.key === 'Delete' || e.key === 'Backspace') { if (isEditor() && KH.sel.r1 >= 0) { khDel(); e.preventDefault(); } return; }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      const s = KH.sel; if (s.r1 < 0) return;
      let r = s.r1, c = s.c1;
      if (e.key === 'ArrowUp') r = Math.max(0, r-1);
      if (e.key === 'ArrowDown') r = Math.min(KH.TOTAL_ROWS-1, r+1);
      if (e.key === 'ArrowLeft') c = Math.max(0, c-1);
      if (e.key === 'ArrowRight') c = Math.min(khTC()-1, c+1);
      if (e.shiftKey) { KH.sel.r2 = r; KH.sel.c2 = c; } else KH.sel = { r1:r, c1:c, r2:r, c2:c };
      KH.showSel = true;
      khScrollTo(r); khSelUI(); e.preventDefault(); return;
    }
    if (!cmd && e.key.length === 1 && KH.sel.r1 >= 0 && KH.sel.r1 === KH.sel.r2 && KH.sel.c1 === KH.sel.c2) {
      if (!isEditor()) return; // Salt okunur modda klavye ile düzenleme engellendi
      const { r1: selR, c1: selC } = KH.sel;
      const cell = document.querySelector(`.khc[data-ri="${selR}"][data-ci="${selC}"]`);
      if (cell) {
        if (selC < KH_FIXED.length) KH.paramData[selR][selC] = '';
        else khMValSet(KH_MODELS[selC - KH_FIXED.length].id, selR, '');
        const k = e.key;
        khDD({ currentTarget: cell, stopPropagation: () => {} }, selR, selC);
        setTimeout(() => { if (KH.editEl) { KH.editEl.value = k; KH.editEl.setSelectionRange(1,1); } }, 0);
      }
    }
  }

  // ── Auth — Google OAuth ──────────────────────────────────────────────────
  function authLoginWithGoogle() {
    const redirectTo = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/') + 'kalite.html';
    window.location.href = SB_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(redirectTo);
  }

  // ── Token yenileme ──────────────────────────────────────────────────────────
  async function authRefreshToken() {
    try {
      const raw = localStorage.getItem('kx_editor_session');
      if (!raw) return false;
      const s = JSON.parse(raw);
      if (!s.refresh_token) return false;
      const res = await fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: s.refresh_token })
      });
      if (!res.ok) return false;
      const data = await res.json();
      SB_TOKEN = data.access_token;
      const expiresAt = Math.floor(Date.now() / 1000) + (data.expires_in || 3600);
      localStorage.setItem('kx_editor_session', JSON.stringify({
        token: data.access_token,
        refresh_token: data.refresh_token || s.refresh_token,
        email: s.email, name: s.name,
        expires_at: expiresAt
      }));
      authScheduleRefresh(expiresAt);
      console.log('[KaliteX] JWT token yenilendi ✓');
      return true;
    } catch(e) {
      console.warn('[KaliteX] Token yenileme hatası:', e);
      return false;
    }
  }

  let _authRefreshTimer = null;
  function authScheduleRefresh(expiresAt) {
    if (_authRefreshTimer) clearTimeout(_authRefreshTimer);
    const delay = (expiresAt - Math.floor(Date.now() / 1000) - 300) * 1000; // expire'dan 5 dk önce
    if (delay > 0) {
      _authRefreshTimer = setTimeout(() => {
        authRefreshToken().then(ok => { if (ok) authUpdateUI(); });
      }, delay);
    }
  }

  async function authCheckCallback() {
    // OAuth sonrası URL'de #access_token=... var mı?
    const hash = window.location.hash;
    if (!hash.includes('access_token=')) return;
    const params = new URLSearchParams(hash.slice(1));
    const token = params.get('access_token');
    if (!token) return;
    history.replaceState(null, '', window.location.pathname); // # temizle
    try {
      const res = await fetch(SB_URL + '/auth/v1/user', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      const data = await res.json();
      const email = (data.email || '').toLowerCase();
      if (ALLOWED_EDITORS.some(e => e.toLowerCase() === email)) {
        SB_TOKEN = token;
        currentUser = { email: data.email, name: data.user_metadata?.name || data.email.split('@')[0] };
        const refreshToken = params.get('refresh_token');
        const expiresIn = parseInt(params.get('expires_in') || '3600', 10);
        const expiresAt = Math.floor(Date.now() / 1000) + expiresIn;
        localStorage.setItem('kx_editor_session', JSON.stringify({
          token, refresh_token: refreshToken,
          email: data.email, name: currentUser.name,
          expires_at: expiresAt
        }));
        authScheduleRefresh(expiresAt);
      } else {
        khToast('⛔ ' + data.email + ' düzenleyici listesinde değil.', 4000);
      }
    } catch(e) { console.warn('[KaliteX] OAuth callback hatası:', e); }
  }

  function authCheckSession() {
    try {
      const raw = localStorage.getItem('kx_editor_session');
      if (!raw) return;
      const s = JSON.parse(raw);
      const now = Math.floor(Date.now() / 1000);
      if (s.token && s.expires_at > now) {
        SB_TOKEN = s.token;
        currentUser = { email: s.email, name: s.name };
        authScheduleRefresh(s.expires_at);
      } else if (s.refresh_token) {
        // Token expire olmuş ama refresh_token var — kullanıcıyı restore et, async yenile
        currentUser = { email: s.email, name: s.name };
        authRefreshToken().then(ok => {
          if (!ok) {
            localStorage.removeItem('kx_editor_session');
            currentUser = null; SB_TOKEN = null;
          }
          authUpdateUI();
        });
      } else {
        localStorage.removeItem('kx_editor_session');
      }
    } catch(e) {}
  }

  function authSignOut() {
    SB_TOKEN = null;
    currentUser = null;
    localStorage.removeItem('kx_editor_session');
    authUpdateUI();
    khToast('Çıkış yapıldı.', 1500);
  }

  function authUpdateUI() {
    const el = document.getElementById('auth-ui');
    if (!el) return;
    if (currentUser) {
      el.innerHTML = `<span style="font-size:0.8rem;font-weight:600;color:#6b7280;">✏️ ${currentUser.name}</span><button onclick="authSignOut()" style="display:flex;align-items:center;gap:6px;background:#dc2626;color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;">Çıkış</button>`;
    } else {

  function openLogin() {}
  function closeLogin() {}
  function handleLogin(e) { e.preventDefault(); }

  function kfRequireModel() {
    if (!window.kfCurrentModel) {
      kfToast('Model Se\u00e7iniz');
      return false;
    }
    return true;
  }

  function handleFormAction(action) {
    switch(action) {
      case 'save':
        if (!isEditor()) { kfToast('Salt okunur modda kayıt yapılamaz.'); return; }
        if (!kfRequireModel()) return;
        if (window.kfCurrentSaveId) kfDoSave(window.kfCurrentSaveName, false);
        else kfShowSaveModal(false);
        break;
      case 'save-as':
        if (!isEditor()) { kfToast('Salt okunur modda kayıt yapılamaz.'); return; }
        if (!kfRequireModel()) return;
        kfShowSaveModal(true);
        break;
      case 'load':
        kfShowLoadModal();
        break;
      case 'notes':
        if (!isEditor()) { kfToast('Salt okunur modda not eklenemez.'); return; }
        kfShowNotesModal();
        break;
    }
  }

  function toggleModelDropdown() {
    const dropdown = document.getElementById('model-dropdown');
    const chevron = document.getElementById('model-chevron');
    const btn = document.getElementById('model-select-btn');
    const isHidden = dropdown.classList.contains('hidden');
    if (isHidden) {
      const r = btn.getBoundingClientRect();
      dropdown.style.top = (r.bottom + 4) + 'px';
      dropdown.style.left = r.left + 'px';
      // Ekran dışına taşmasın
      dropout_fix: {
        const w = dropdown.offsetWidth || 256;
        if (r.left + w > window.innerWidth) dropdown.style.left = (r.right - w) + 'px';
      }
    }
    dropdown.classList.toggle('hidden');
    chevron.style.transform = dropdown.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  // Formda doldurulmuş veri var mı?
  function kfFormHasData() {
    if (!window.kfData || !window.kfData.length) return false;
    if (window.kfCurrentSaveId) return true; // Zaten kaydedilmiş = veri var
    const n = window.kfNotes || {};
    if ((n.aksilikler||[]).length || (n.revizeler||[]).length) return true;
    return window.kfData.some(row => row[3] && String(row[3]).trim());
  }

  function selectModel(modelId) {
    const dropdown = document.getElementById('model-dropdown');
    if (dropdown) dropdown.classList.add('hidden');
    const chevron = document.getElementById('model-chevron');
    if (chevron) chevron.style.transform = 'rotate(0deg)';

    // Aynı model veya henüz model seçilmemiş — direkt yükle
    if (!window.kfCurrentModel || window.kfCurrentModel === modelId) {
      kfLoadModel(modelId);
      return;
    }

    // Formda doldurulmuş veri yoksa direkt geç
    if (!kfFormHasData()) {
      kfLoadModel(modelId);
      return;
    }

    const targetLabel = (KH_MODELS.find(m => m.id === modelId) || {label: modelId}).label;

    if (window.kfCurrentSaveId) {
      // Zaten kaydedilmiş bir form — sessizce güncelle, sonra yeni modeli temiz aç
      kfDoSave(window.kfCurrentSaveName, false);
      kfToast('✓ Kaydedildi — ' + targetLabel + ' formu açılıyor…');
      window.kfData = []; // Eski cevapları taşıma
      kfLoadModel(modelId);
    } else {
      // İsimsiz/kaydedilmemiş form — önce isim sor, sonra yeni modeli aç
      window._kfPendingModelId = modelId;
      kfShowSaveModal(false);
    }
  }

  function kfLoadModel(modelId) {
    if (currentPage !== 'kalite-formu') { navigate(modelId); return; }
    const model = KH_MODELS.find(m => m.id === modelId);
    const params = khGetModelParams(modelId);
    window.kfCurrentModel = modelId;
    window.kfCurrentModelLabel = model ? model.label : modelId;
    window.kfModelRows = params;
    // Mevcut cevapları (sütun 3-5) KOD ile eşleştir, model verisini (sütun 0-2) havuz sırasına göre yükle
    const oldByKod = {};
    (window.kfData || []).forEach(row => {
      const kod = (row[0] || '').toUpperCase().trim();
      if (kod) oldByKod[kod] = row;
    });
    window.kfData = params.map((r) => {
      const kodKey = (r.kod || '').toUpperCase().trim();
      const old = oldByKod[kodKey] || [];
      // K9013 → her zaman FATİH GÜRAL, değiştirilemez
      const sonuc = (r.kod||'').toUpperCase().trim() === 'K9013' ? 'FATİH GÜRAL' : (old[3]||'');
      return [r.kod, r.aciklama, r.grup, sonuc, old[4]||'', old[5]||'', 1, r.alanTuru||''];
    });
    // Model adı etiketi
    // Buton metnini seçilen model adına çevir
    const selLbl = document.getElementById('model-select-label');
    if (selLbl) selLbl.textContent = window.kfCurrentModelLabel;
    // Yeni model seçilince kayıt durumu ve notları sıfırla
    window.kfCurrentSaveId = null; window.kfCurrentSaveName = '';
    window.kfNotes = {aksilikler:[],revizeler:[]};
    const slbl = document.getElementById('kf-save-name');
    if (slbl) slbl.style.display = 'none';
    kfNotesUpdateBadge();
    // Tabloyu yeniden oluştur
    if (typeof window.kfBuildRows === 'function') {
      const tbody = document.getElementById('kf-tbody');
      if (tbody) tbody.innerHTML = window.kfBuildRows();
    }
  }

  // ── Kalite Formu Özel Klavye ─────────────────────────────────────────────
  window.kfKb = { ri: -1, type: null, val: '', shift: false };

  window.kfSonucSet = function(ri, val) {
    if (window.kfData && window.kfData[ri]) {
      window.kfData[ri][3] = val;
      // Referans geçmişi: seçim değiştikçe yanına yaz
      if (val) {
        const cur = window.kfData[ri][5] || '';
        window.kfData[ri][5] = cur ? cur + ' / ' + val : val;
        // Tabloda Referans hücresini güncelle
        const refCell = document.querySelector(`#kf-tbody .kf-row[data-ri="${ri}"] .kf-cell[data-ci="5"] .kf-cv`);
        if (refCell) refCell.textContent = window.kfData[ri][5];
      }
    }
  };

  // Gruptaki boş T tipi satırları EVET yap (HAYIR ve KD dokunulmaz)
  window.kfGroupAllEvet = function(grupAdi) {
    if (!window.kfData) return;
    let degistirilen = 0;
    window.kfData.forEach((row, ri) => {
      if (row[6] !== 1) return;
      if ((row[2] || '') !== grupAdi) return;
      if ((row[7] || '').toUpperCase().trim() !== 'T') return;
      const val = String(row[3] || '').trim().toUpperCase();
      if (val === 'EVET' || val === 'HAYIR' || val === 'KD') return;
      if (val) return;
      window.kfSonucSet(ri, 'EVET');
      const sel = document.querySelector(`#kf-tbody .kf-row[data-ri="${ri}"] select.kf-sel`);
      if (sel) sel.value = 'EVET';
      degistirilen++;
    });
    if (degistirilen === 0) {
      kfToast('Bu grupta doldurulacak boş soru yok ✓');
    } else {
      kfToast(`✓ ${grupAdi}: ${degistirilen} boş satır EVET yapıldı`);
    }
  };

  window.kfKbOpen = function(ri, type) {
    if (!window.kfData || !window.kfData[ri]) return;
    window.kfKb.ri = ri;
    window.kfKb.type = type;
    window.kfKb.val = window.kfData[ri][3] || '';
    window.kfKb.shift = false;
    const panel = document.getElementById('kf-kb');
    if (!panel) return;
    panel.className = 'kf-kb' + (type === 'TN' ? ' kf-kb-text' : '');
    panel.style.display = 'block';
    kfKbRender();
  };

  window.kfKbClose = function() {
    const panel = document.getElementById('kf-kb');
    if (panel) panel.style.display = 'none';
    window.kfKb.ri = -1;
  };

  window.kfKbOK = function() {
    const kb = window.kfKb;
    if (kb.ri >= 0 && window.kfData && window.kfData[kb.ri]) {
      window.kfData[kb.ri][3] = kb.val;
      const tbody = document.getElementById('kf-tbody');
      if (tbody && typeof window.kfBuildRows === 'function') tbody.innerHTML = window.kfBuildRows();
    }
    kfKbClose();
  };

  window.kfKbType = function(ch) {
    const kb = window.kfKb;
    const TR = {'ı':'I','i':'İ','ğ':'Ğ','ü':'Ü','ş':'Ş','ö':'Ö','ç':'Ç'};
    if (kb.type === 'N') {
      if (ch === 'BS')       kb.val = kb.val.slice(0,-1);
      else if (ch === 'C')   kb.val = '';
      else if (ch === 'PM')  kb.val = kb.val.startsWith('-') ? kb.val.substring(1) : (kb.val ? '-'+kb.val : '');
      else if (ch === 'DOT') { if (!kb.val.includes('.')) kb.val = (kb.val||'0')+'.'; }
      else { if ((kb.val.replace(/[-\.]/g,'')).length < 6) kb.val += ch; }
    } else {
      if (ch === 'BS') kb.val = kb.val.slice(0,-1);
      else if (ch === 'SP') { if (kb.val.length < 30) kb.val += ' '; }
      else {
        if (kb.val.length >= 30) return;
        kb.val += kb.shift ? (TR[ch] || ch.toUpperCase()) : ch;
        if (kb.shift) kb.shift = false;
      }
    }
    kfKbRender();
  };

  window.kfKbShift = function() {
    window.kfKb.shift = !window.kfKb.shift;
    kfKbRender();
  };

  function kfKbRender() {
    const kb = window.kfKb;
    const panel = document.getElementById('kf-kb');
    if (!panel) return;
    const isN = kb.type === 'N';
    const sh = kb.shift;
    const TR = {'ı':'I','i':'İ','ğ':'Ğ','ü':'Ü','ş':'Ş','ö':'Ö','ç':'Ç'};
    let keys = '';
    if (isN) {
      [['7','8','9','BS'],['4','5','6','C'],['1','2','3',''],['DOT','0','','OK']].forEach(row => {
        keys += '<div class="kfkb-row">';
        const lab = {'BS':'⌫','C':'C','PM':'±','DOT':'.','OK':'✓'};
        const sp  = new Set(['BS','C','PM']);
        row.forEach(k => {
          if (!k) { keys += '<button class="kfkb-btn" style="visibility:hidden;pointer-events:none;"></button>'; return; }
          if (k === 'OK') { keys += `<button class="kfkb-btn kfkb-ok" onclick="kfKbOK()">${lab[k]}</button>`; return; }
          const cls = sp.has(k) ? 'kfkb-btn kfkb-sp' : 'kfkb-btn';
          keys += `<button class="${cls}" onclick="kfKbType('${k}')">${lab[k]||k}</button>`;
        });
        keys += '</div>';
      });
    } else {
      [['q','w','e','r','t','y','u','ı','o','p','ğ','ü'],
       ['a','s','d','f','g','h','j','k','l','ş','i'],
       ['z','x','c','v','b','n','m','ö','ç']
      ].forEach((row, ri) => {
        keys += '<div class="kfkb-row">';
        if (ri === 2) keys += `<button class="kfkb-btn kfkb-sp${sh?' kfkb-shift-on':''}" style="min-width:44px;" onclick="kfKbShift()">⇧</button>`;
        row.forEach(k => {
          const d = sh ? (TR[k]||k.toUpperCase()) : k;
          keys += `<button class="kfkb-btn" onclick="kfKbType('${k}')">${d}</button>`;
        });
        if (ri === 2) keys += `<button class="kfkb-btn kfkb-sp" style="min-width:44px;" onclick="kfKbType('BS')">⌫</button>`;
        keys += '</div>';
      });
      keys += `<div class="kfkb-row"><button class="kfkb-btn kfkb-space" onclick="kfKbType('SP')">BOŞLUK</button><button class="kfkb-btn kfkb-ok" style="min-width:72px;" onclick="kfKbOK()">✓ Tamam</button></div>`;
    }
    const rawDisp = String(kb.val||'');
    const disp = isN ? (rawDisp||'0') : (rawDisp ? rawDisp.replace(/&/g,'&amp;').replace(/</g,'&lt;') : '—');
    const badge = !isN ? `<span style="font-size:10px;font-weight:400;opacity:.7;">${rawDisp.length}/30</span>` : '';
    panel.innerHTML = `
      <div class="kf-kb-hdr">
        <span>${isN ? '🔢 Sayı Girişi' : '⌨ Metin Girişi'} ${badge}</span>
        <button onclick="kfKbClose()">✕</button>
      </div>
      <div class="kf-kb-disp">${disp}</div>
      <div class="kf-kb-keys">${keys}</div>
    `;
  }

  // ── Kalite Havuzu Kaydet / Yükle ─────────────────────────────────────────────
  // ── Kalite Havuzu Force Reload ───────────────────────────────────────────────
  async function khForceReload() {
    if (!navigator.onLine) { khToast('Offline — Supabase\'e bağlanılamıyor', 3000); return; }
    KH._ready = false;
    khSyncStatus('syncing');
    khToast('Supabase\'den yükleniyor...', 5000);
    try {
      await khLoadFromSupabase();
      khSyncStatus('ok');
      KH._ready = true;
      if (document.getElementById('kh-thead')) { khBuildFR(); khBuildHeader(); khVSR(); }
      khToast('Supabase\'den yüklendi ✓', 2000);
    } catch(e) {
      khSyncStatus('error');
      khToast('Hata: ' + (e.message||e), 4000);
    }
  }

  // ── Kalite Formu Not Modalı ────────────────────────────────────────────────
  // Veri formatı: { aksilikler: ['madde1','madde2',...], revizeler: ['madde1',...] }
  let _kfnw = { aksilikler: [], revizeler: [] };

  function kfNotesNormalize(n) {
    if (!n) return { aksilikler: [], revizeler: [] };
    if (Array.isArray(n.aksilikler)) return { aksilikler: [...n.aksilikler], revizeler: [...(n.revizeler || [])] };
    const toArr = s => (s || '').split('\n').map(x => x.trim()).filter(Boolean);
    return { aksilikler: toArr(n.aksilik), revizeler: toArr(n.revize) };
  }

  function kfNotesEnsureWorking() {
    if (!_kfnw || !Array.isArray(_kfnw.aksilikler) || !Array.isArray(_kfnw.revizeler)) {
      _kfnw = kfNotesNormalize(window.kfNotes);
    }
  }

  function kfNotesInpId(side) { return side === 'a' ? 'kfnm-inp-a' : 'kfnm-inp-r'; }
  function kfNotesListId(side) { return side === 'a' ? 'kfnm-list-a' : 'kfnm-list-r'; }
  function kfNotesMicId(side) { return side === 'a' ? 'kfnm-mic-a' : 'kfnm-mic-r'; }
  function kfNotesIsMobile() { return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent); }

  function kfNotesStatus(msg) {
    const el = document.getElementById('kfnm-status');
    if (!el) return;
    el.textContent = msg || '';
    el.classList.toggle('on', !!msg);
  }

  function kfNotesBindTap(el, fn) {
    if (!el || el._kfTapBound) return;
    el._kfTapBound = true;
    let last = 0;
    const run = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const now = Date.now();
      if (now - last < 350) return;
      last = now;
      fn();
    };
    el.addEventListener('click', run);
    el.addEventListener('touchend', run, { passive: false });
  }

  function kfNotesWireEvents() {
    if (window._kfNotesWired) return;
    window._kfNotesWired = true;
    const overlay = document.getElementById('kf-notes-overlay');
    if (!overlay) return;

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) kfNotesClose();
    });

    overlay.querySelectorAll('[data-kfnm-add]').forEach(btn => {
      kfNotesBindTap(btn, () => kfNotesAdd(btn.getAttribute('data-kfnm-add')));
    });
    overlay.querySelectorAll('[data-kfnm-mic]').forEach(btn => {
      kfNotesBindTap(btn, () => kfNotesMic(btn.getAttribute('data-kfnm-mic')));
    });
    ['kfnm-list-a', 'kfnm-list-r'].forEach(id => {
      document.getElementById(id)?.addEventListener('click', (e) => {
        const delBtn = e.target.closest('[data-kfnm-del]');
        if (!delBtn) return;
        e.preventDefault();
        kfNotesDel(delBtn.getAttribute('data-kfnm-del'), +delBtn.getAttribute('data-kfnm-idx'));
      });
    });
    ['a', 'r'].forEach(side => {
      const inp = document.getElementById(kfNotesInpId(side));
      if (!inp) return;
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); kfNotesAdd(side); }
      });
    });
    const cancelBtn = document.getElementById('kfnm-cancel');
    const saveBtn = document.getElementById('kfnm-save');
    if (cancelBtn) kfNotesBindTap(cancelBtn, kfNotesClose);
    if (saveBtn) kfNotesBindTap(saveBtn, kfNotesSave);
  }

  function kfPackFormPayload(kfData, kfNotes) {
    return {
      _v: 2,
      rows: JSON.parse(JSON.stringify(kfData || [])),
      notes: kfNotesNormalize(kfNotes)
    };
  }

  function kfUnpackFormPayload(data, fallbackNotes) {
    if (data && typeof data === 'object' && !Array.isArray(data) && data._v === 2) {
      return {
        rows: JSON.parse(JSON.stringify(data.rows || [])),
        notes: kfNotesNormalize(data.notes)
      };
    }
    return {
      rows: Array.isArray(data) ? JSON.parse(JSON.stringify(data)) : [],
      notes: kfNotesNormalize(fallbackNotes)
    };
  }

  function kfFormGetRows(f) { return kfUnpackFormPayload(f?.data, f?.notes).rows; }
  function kfFormGetNotes(f) { return kfUnpackFormPayload(f?.data, f?.notes).notes; }

  window.kfNotes = window.kfNotes || {aksilikler:[], revizeler:[]};

  function kfNotesUpdateBadge() {
    const badge = document.getElementById('kf-note-badge');
    if (!badge) return;
    const n = window.kfNotes || {};
    const hasNote = (n.aksilikler||[]).length > 0 || (n.revizeler||[]).length > 0;
    badge.style.display = hasNote ? 'block' : 'none';
  }

  function kfNotesRenderList(side) {
    kfNotesEnsureWorking();
    const el = document.getElementById(kfNotesListId(side));
    const arr = side === 'a' ? _kfnw.aksilikler : _kfnw.revizeler;
    if (!el) return;
    if (!arr.length) { el.innerHTML = '<div class="kfnm-empty">Henüz madde yok.</div>'; return; }
    el.innerHTML = arr.map((txt, i) =>
      `<div class="kfnm-item"><span class="kfnm-item-num">${i + 1}</span><span class="kfnm-item-txt">${kfHEsc(txt)}</span><button type="button" class="kfnm-item-del" data-kfnm-del="${side}" data-kfnm-idx="${i}" title="Sil">×</button></div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
  }

  function kfNotesFlushInput(side) {
    kfNotesEnsureWorking();
    const inp = document.getElementById(kfNotesInpId(side));
    if (!inp) return false;
    const val = String(inp.value || '').trim();
    if (!val) return false;
    if (side === 'a') _kfnw.aksilikler.push(val);
    else _kfnw.revizeler.push(val);
    inp.value = '';
    kfNotesRenderList(side);
    return true;
  }

  function kfNotesAdd(side) {
    kfNotesEnsureWorking();
    if (_kfnmSR) kfNotesMicStop();
    const inp = document.getElementById(kfNotesInpId(side));
    if (!inp) return;
    const val = String(inp.value || '').trim();
    if (!val) {
      inp.style.borderColor = '#dc2626';
      setTimeout(() => { inp.style.borderColor = ''; }, 600);
      return;
    }
    if (side === 'a') _kfnw.aksilikler.push(val);
    else _kfnw.revizeler.push(val);
    inp.value = '';
    kfNotesRenderList(side);
    kfToast('Madde eklendi ✓', 1200);
    inp.focus();
  }

  function kfNotesDel(side, idx) {
    kfNotesEnsureWorking();
    if (side === 'a') _kfnw.aksilikler.splice(idx, 1);
    else _kfnw.revizeler.splice(idx, 1);
    kfNotesRenderList(side);
  }

  let _kfnmSR = null;
  let _kfnmSRSide = null;
  let _kfnmManualStop = false;
  let _kfnmMicStream = null;

  function kfNotesMicStop() {
    _kfnmManualStop = true;
    if (_kfnmSR) { try { _kfnmSR.abort(); } catch (e) {} _kfnmSR = null; }
    _kfnmSRSide = null;
    if (_kfnmMicStream) {
      _kfnmMicStream.getTracks().forEach(t => t.stop());
      _kfnmMicStream = null;
    }
    document.querySelectorAll('.kfnm-mic.listening').forEach(b => b.classList.remove('listening'));
  }

  async function kfNotesMic(side) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      kfNotesStatus('Ses tanıma desteklenmiyor — Chrome kullanın.');
      kfToast('Ses tanıma için Chrome kullanın.');
      return;
    }

    if (!window.isSecureContext) {
      const msg = 'Telefonda mikrofon için HTTPS gerekli. KaliteX-Baslat.bat ile HTTPS modunu kullanın.';
      kfNotesStatus(msg);
      kfToast(msg);
      return;
    }

    if (_kfnmSR && _kfnmSRSide === side) {
      kfNotesMicStop();
      kfNotesStatus('');
      kfToast('Dinleme durduruldu');
      return;
    }
    kfNotesMicStop();
    _kfnmManualStop = false;

    const inp = document.getElementById(kfNotesInpId(side));
    const btn = document.getElementById(kfNotesMicId(side));
    const mobile = kfNotesIsMobile();
    const base = inp ? inp.value.trimEnd() : '';

    if (inp) inp.blur();

    if (!mobile && navigator.mediaDevices?.getUserMedia) {
      try {
        _kfnmMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        kfNotesStatus('Mikrofon izni reddedildi.');
        kfToast('Mikrofon izni gerekli.');
        return;
      }
    }

    const sr = new SR();
    sr.lang = 'tr-TR';
    sr.continuous = !mobile;
    sr.interimResults = true;
    sr.maxAlternatives = 1;
    _kfnmSR = sr;
    _kfnmSRSide = side;

    sr.onstart = () => {
      if (btn) btn.classList.add('listening');
      if (inp) inp.placeholder = '🎤 Konuşun…';
      kfNotesStatus('Dinleniyor… (🎤 ile durdurun)');
    };

    sr.onresult = (e) => {
      let chunk = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        chunk += e.results[i][0].transcript;
      }
      const merged = (base + (base && chunk ? ' ' : '') + chunk.trim()).trimStart();
      if (inp) inp.value = merged;
    };

    sr.onend = () => {
      if (btn) btn.classList.remove('listening');
      if (inp) {
        inp.placeholder = side === 'a' ? 'Aksiliği yaz, Enter veya Ekle...' : 'Öneriyi yaz, Enter veya Ekle...';
      }
      if (_kfnmMicStream) {
        _kfnmMicStream.getTracks().forEach(t => t.stop());
        _kfnmMicStream = null;
      }
      if (!_kfnmManualStop && _kfnmSR === sr) {
        if (mobile) {
          setTimeout(() => {
            if (!_kfnmManualStop && _kfnmSR === sr) {
              try { sr.start(); } catch (err) { /* mobil yeniden dinle */ }
            }
          }, 280);
          return;
        }
        try { sr.start(); return; } catch (e) { /* masaüstü */ }
      }
      if (_kfnmSR === sr) {
        _kfnmSR = null;
        _kfnmSRSide = null;
        kfNotesStatus('');
      }
    };

    sr.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'aborted') return;
      _kfnmSR = null;
      _kfnmSRSide = null;
      if (btn) btn.classList.remove('listening');
      if (_kfnmMicStream) {
        _kfnmMicStream.getTracks().forEach(t => t.stop());
        _kfnmMicStream = null;
      }
      const msgs = {
        'not-allowed': 'Mikrofon izni reddedildi.',
        'service-not-allowed': 'HTTPS + Chrome gerekli (http://IP ile çalışmaz).',
        'network': 'İnternet bağlantısı gerekli.',
        'audio-capture': 'Mikrofon bulunamadı.'
      };
      const msg = msgs[e.error] || ('Mikrofon: ' + e.error);
      kfNotesStatus(msg);
      kfToast(msg);
    };

    try {
      sr.start();
    } catch (e) {
      kfNotesMicStop();
      const msg = 'Mikrofon başlatılamadı: ' + (e.message || e);
      kfNotesStatus(msg);
      kfToast(msg);
    }
  }

  let _kxDriveTokenExport = null;
  let _kxDriveTokenBackup = null;
  let _kxTokenClientExport = null;
  let _kxTokenClientBackup = null;
  const KX_QUALITY_FORMS_FOLDER_KEY = 'kx_quality_forms_folder_id';
  const KX_XLSX_EXPORT_LOG_KEY = 'kx_xlsx_export_log';

  function kxGetExportLog() { try { return JSON.parse(localStorage.getItem(KX_XLSX_EXPORT_LOG_KEY)||'{}'); } catch(e) { return {}; } }
  function kxSaveExportLog(l) { localStorage.setItem(KX_XLSX_EXPORT_LOG_KEY, JSON.stringify(l)); }

  async function kxDriveFolderOk(H, id) {
    if (!id) return false;
    try {
      const res = await fetch(
        'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(id) + '?fields=id,mimeType,trashed',
        { headers: H }
      );
      if (!res.ok) return false;
      const f = await res.json();
      return !!f.id && !f.trashed && f.mimeType === 'application/vnd.google-apps.folder';
    } catch (e) { return false; }
  }

  async function kxDriveFileOk(H, id) {
    if (!id) return false;
    try {
      const res = await fetch(
        'https://www.googleapis.com/drive/v3/files/' + encodeURIComponent(id) + '?fields=id,trashed',
        { headers: H }
      );
      if (!res.ok) return false;
      const f = await res.json();
      return !!f.id && !f.trashed;
    } catch (e) { return false; }
  }

  async function kxFindFileInFolder(H, folderId, filename) {
    const q = `'${folderId}' in parents and name='${String(filename).replace(/\\/g, '\\\\').replace(/'/g, "\\'")}' and trashed=false`;
    const res = await fetch(
      'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id)&pageSize=1',
      { headers: H }
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.files?.[0]?.id || null;
  }

  function kxRequestDriveToken(onToken, mode) {
    mode = mode || 'export';
    const isBackup = mode === 'backup';
    if (!window.google || !window.google.accounts) {
      kfToast('Google kiti yükleniyor, birkaç saniye bekleyip tekrar deneyin.');
      return;
    }
    const scope = isBackup
      ? 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive'
      : 'https://www.googleapis.com/auth/drive.file';
    let client = isBackup ? _kxTokenClientBackup : _kxTokenClientExport;
    if (!client) {
      client = google.accounts.oauth2.initTokenClient({
        client_id: KX_GDRIVE_CLIENT_ID,
        scope,
        callback: (resp) => {
          if (resp.error) { kfToast('Google yetkilendirme hatası: ' + resp.error); return; }
          if (isBackup) _kxDriveTokenBackup = resp.access_token;
          else _kxDriveTokenExport = resp.access_token;
          onToken(resp.access_token);
        }
      });
      if (isBackup) _kxTokenClientBackup = client;
      else _kxTokenClientExport = client;
    }
    const cached = isBackup ? _kxDriveTokenBackup : _kxDriveTokenExport;
    if (cached) onToken(cached);
    else client.requestAccessToken();
  }

  function kxDriveBackup() {
    kxRequestDriveToken(kxDoExport, 'backup');
  }

  function kxPickQualityFormsFolder(token) {
    return new Promise((resolve, reject) => {
      if (!KX_GDRIVE_API_KEY) {
        reject(new Error('API_KEY_MISSING'));
        return;
      }
      const showPicker = () => {
        const view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
          .setIncludeFolders(true)
          .setSelectFolderEnabled(true)
          .setMimeTypes('application/vnd.google-apps.folder');
        new google.picker.PickerBuilder()
          .setAppId(KX_GDRIVE_PROJECT_NUM)
          .setOAuthToken(token)
          .setDeveloperKey(KX_GDRIVE_API_KEY)
          .addView(view)
          .setTitle('QUALITY FORMS klas\u00f6r\u00fcn\u00fc se\u00e7in')
          .setCallback((data) => {
            if (data.action === google.picker.Action.PICKED) {
              const folderId = data.docs[0].id;
              localStorage.setItem(KX_QUALITY_FORMS_FOLDER_KEY, folderId);
              resolve(folderId);
            } else {
              reject(new Error('Klas\u00f6r se\u00e7imi iptal edildi.'));
            }
          })
          .build()
          .setVisible(true);
      };
      if (window.google?.picker) showPicker();
      else if (window.gapi) gapi.load('picker', showPicker);
      else reject(new Error('Google Picker y\u00fcklenemedi.'));
    });
  }

  async function kxCreateDriveFolder(H, name) {
    const res = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST', headers: H,
      body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder' })
    });
    if (!res.ok) throw new Error('Klas\u00f6r olu\u015fturulamad\u0131: ' + res.status);
    return (await res.json()).id;
  }

  async function kxEnsureExportFolder(H, token) {
    let saved = kxGetQualityFormsFolderId();
    if (saved && await kxDriveFolderOk(H, saved)) return saved;
    if (saved) {
      localStorage.removeItem(KX_QUALITY_FORMS_FOLDER_KEY);
      console.warn('[KaliteX] Kay\u0131tl\u0131 QUALITY FORMS klas\u00f6r\u00fc ge\u00e7ersiz, yeniden ayarlan\u0131yor');
    }
    if (KX_GDRIVE_API_KEY) {
      kfToast('QUALITY FORMS klas\u00f6r\u00fcn\u00fc se\u00e7in\u2026');
      return await kxPickQualityFormsFolder(token);
    }
    const folderId = await kxCreateDriveFolder(H, 'QUALITY FORMS');
    localStorage.setItem(KX_QUALITY_FORMS_FOLDER_KEY, folderId);
    kfToast('QUALITY FORMS klas\u00f6r\u00fc olu\u015fturuldu (Drive k\u00f6k\u00fcnde).');
    return folderId;
  }

  const KX_FORM_TABLE_HDR = ['Parametre Kodu', 'Açıklama', 'Grup', 'Sonuç', 'Durum', 'Referans'];

  function kxBuildFormSheetRows(f) {
    const n = kfFormGetNotes(f);
    return [
      ['Form Adı',         f.name || ''],
      ['Model',            f.modelLabel || f.modelId || ''],
      ['Kaydedilme',       f.savedAt ? new Date(f.savedAt).toLocaleString('tr-TR') : ''],
      ['Güncelleme',       f.updatedAt ? new Date(f.updatedAt).toLocaleString('tr-TR') : ''],
      ['Aksilikler',       n.aksilikler.join(' | ') || '—'],
      ['Revize Önerileri', n.revizeler.join(' | ') || '—'],
      [],
      KX_FORM_TABLE_HDR,
      ...kfFormGetRows(f).map(row => [
        String(row[0]||''), String(row[1]||''), String(row[2]||''),
        String(row[3]||''), String(row[4]||''), String(row[5]||'')
      ])
    ];
  }

  function kxFormToXlsxBlob(f) {
    if (typeof XLSX === 'undefined') throw new Error('Excel kiti yüklenemedi');
    const ws = XLSX.utils.aoa_to_sheet(kxBuildFormSheetRows(f));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Veri');
    const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    return new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  }

  async function kxUploadXlsx(H, folderId, filename, blob, existingId) {
    async function doUpload(fileId) {
      const metadata = { name: filename, mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' };
      if (!fileId) metadata.parents = [folderId];
      const formData = new FormData();
      formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      formData.append('file', blob);
      const url = fileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      return fetch(url, {
        method: fileId ? 'PATCH' : 'POST',
        headers: { 'Authorization': H.Authorization },
        body: formData
      });
    }
    let res = existingId ? await doUpload(existingId) : await doUpload(null);
    // Kayıtlı dosya silinmiş veya erişim yok — yeniden oluştur
    if (!res.ok && existingId && (res.status === 404 || res.status === 403)) {
      console.warn('[KaliteX] Drive dosyası bulunamadı, yeniden oluşturuluyor:', filename);
      res = await doUpload(null);
    }
    if (!res.ok && !existingId && res.status === 404) {
      throw new Error('FOLDER_INVALID');
    }
    if (!res.ok) throw new Error('Drive yükleme hatası: ' + res.status + ' — ' + filename);
    return (await res.json()).id;
  }

  function kfExportAllForms(forcePickFolder) {
    if (!isEditor()) { kfToast('Salt okunur modda dışarı aktarılamaz.'); return; }
    if (forcePickFolder) localStorage.removeItem(KX_QUALITY_FORMS_FOLDER_KEY);
