  async function kxDoExportQualityForms(token, _folderRetry) {
    const btn = document.querySelector('.kfm-export');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
    kfToast('Formlar Excel olarak aktarılıyor…');
    try {
      const H = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
      const folderId = await kxEnsureExportFolder(H, token);
      let forms = kfGetForms();
      if (navigator.onLine) {
        const synced = await kfSbFetchForms();
        if (synced) forms = synced;
      }
      if (!forms.length) { kfToast('Aktarılacak form bulunamadı.'); return; }
      const exportLog = kxGetExportLog();
      const usedNames = {};
      let written = 0, skipped = 0;
      for (const f of forms) {
        const stamp = f.updatedAt || f.savedAt || '';
        const prev = exportLog[f.id];
        const canSkip = prev?.fileId
          && prev.folderId === folderId
          && prev.updatedAt === stamp
          && await kxDriveFileOk(H, prev.fileId);
        if (canSkip) { skipped++; continue; }
        let base = String(f.name || 'Form').replace(/[\\\/\?\*\[\]\:]/g, '-').trim().substring(0, 90) || 'Form';
        let filename = base + '.xlsx';
        if (usedNames[filename]) filename = base + ' (' + f.id.slice(-6) + ').xlsx';
        usedNames[filename] = true;
        const blob = kxFormToXlsxBlob(f);
        let existingId = (prev?.folderId === folderId && prev?.fileId) ? prev.fileId : null;
        if (!existingId || !(await kxDriveFileOk(H, existingId))) {
          existingId = await kxFindFileInFolder(H, folderId, filename);
        }
        const fileId = await kxUploadXlsx(H, folderId, filename, blob, existingId);
        exportLog[f.id] = { fileId, filename, updatedAt: stamp, folderId };
        written++;
      }
      kxSaveExportLog(exportLog);
      const msg = written
        ? ('\u2713 ' + written + ' form aktar\u0131ld\u0131' + (skipped ? ' \u00b7 ' + skipped + ' de\u011fi\u015fmedi, atland\u0131' : ''))
        : ('\u2713 T\u00fcm formlar g\u00fcncel' + (skipped ? ' (' + skipped + ' form)' : ''));
      kfToast(msg);
      if (await kxDriveFolderOk(H, folderId)) {
        setTimeout(() => window.open('https://drive.google.com/drive/folders/' + folderId, '_blank'), 600);
      }
    } catch (e) {
      if (!_folderRetry && e.message === 'FOLDER_INVALID') {
        localStorage.removeItem(KX_QUALITY_FORMS_FOLDER_KEY);
        kfToast('Klas\u00f6r bulunamad\u0131, yeniden olu\u015fturuluyor\u2026');
        return kxDoExportQualityForms(token, true);
      }
      if (e.message === 'AUTH_EXPIRED') {
        _kxDriveTokenExport = null; _kxTokenClientExport = null;
        kfToast('Oturum süresi doldu, tekrar deneyin.');
      } else if (e.message === 'API_KEY_MISSING') {
        kfToast('Picker i\u00e7in Google API Key gerekli — yeni klas\u00f6r olu\u015fturuluyor\u2026');
        try {
          const H = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
          const folderId = await kxCreateDriveFolder(H, 'QUALITY FORMS');
          localStorage.setItem(KX_QUALITY_FORMS_FOLDER_KEY, folderId);
          await kxDoExportQualityForms(token);
        } catch (e2) {
          kfToast('Dışarı aktarma hatası: ' + (e2.message || e2));
        }
      } else {
        _kxDriveTokenExport = null;
        kfToast('Dışarı aktarma hatası: ' + (e.message || e));
        console.error('[KaliteX] QUALITY FORMS export:', e);
      }
    } finally {
      if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    }
  }

  async function kxDoExport(token) {
    const btn = document.querySelector('[onclick="kxDriveBackup()"]');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
    kfToast('Yedekleniyor…');

    // ── Yardımcı: localStorage yedek logu ─────────────────────────────────
    // log[formId] = { updatedAt, fileId }   log['__KH__'] = { hash, fileId }
    function kxLoadLog() { try { return JSON.parse(localStorage.getItem('kx_backup_log')||'{}'); } catch(e) { return {}; } }
    function kxSaveLog(l) { localStorage.setItem('kx_backup_log', JSON.stringify(l)); }

    // Basit string hash — KH değişiklik tespiti için
    function kxHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
      return h.toString(36);
    }

    // Yeni Sheets dosyası oluştur klasör içinde
    async function kxCreate(H, folderId, title, sheetTitle) {
      const cr = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
        method: 'POST', headers: H,
        body: JSON.stringify({ properties: { title }, sheets: [{ properties: { title: sheetTitle, index: 0 } }] })
      });
      if (!cr.ok) throw new Error('Oluşturulamadı: ' + cr.status + ' — ' + title);
      const ssId = (await cr.json()).spreadsheetId;
      await fetch(`https://www.googleapis.com/drive/v3/files/${ssId}?addParents=${folderId}&removeParents=root&fields=id`, {
        method: 'PATCH', headers: H, body: JSON.stringify({})
      });
      return ssId;
    }

    // Mevcut dosyaya veri yaz + formatla
    async function kxWrite(H, ssId, sheetTitle, rows, headerRowIndex, nCols, infoLabelCols) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values:batchClear`, {
        method: 'POST', headers: H, body: JSON.stringify({ ranges: [sheetTitle] })
      });
      const wRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values/${encodeURIComponent(sheetTitle + '!A1')}?valueInputOption=RAW`, {
        method: 'PUT', headers: H, body: JSON.stringify({ values: rows })
      });
      if (!wRes.ok) throw new Error('Yazılamadı: ' + wRes.status);
      const requests = [];
      requests.push({ repeatCell: {
        range: { sheetId:0, startRowIndex:headerRowIndex, endRowIndex:headerRowIndex+1, startColumnIndex:0, endColumnIndex:nCols },
        cell: { userEnteredFormat: { backgroundColor:{red:0.133,green:0.133,blue:0.133}, textFormat:{bold:true,foregroundColor:{red:1,green:1,blue:1}} } },
        fields: 'userEnteredFormat(backgroundColor,textFormat)'
      }});
      if (infoLabelCols > 0) {
        requests.push({ repeatCell: {
          range: { sheetId:0, startRowIndex:0, endRowIndex:headerRowIndex-1, startColumnIndex:0, endColumnIndex:1 },
          cell: { userEnteredFormat: { textFormat:{bold:true} } },
          fields: 'userEnteredFormat(textFormat)'
        }});
      }
      requests.push({ autoResizeDimensions: { dimensions:{sheetId:0, dimension:'COLUMNS', startIndex:0, endIndex:nCols} } });
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}:batchUpdate`, {
        method: 'POST', headers: H, body: JSON.stringify({ requests })
      });
    }

    try {
      const H = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

      // 1. "KaliteX Database" klasörünü bul veya oluştur
      let folderId = null;
      const folderRes = await fetch(
        'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent("name='KaliteX Database' and mimeType='application/vnd.google-apps.folder' and trashed=false") + '&fields=files(id)',
        { headers: H }
      );
      if (folderRes.status === 401) { _kxDriveTokenBackup = null; _kxTokenClientBackup = null; kfToast('Oturum süresi doldu, tekrar deneyin.'); return; }
      if (folderRes.ok) { const fd = await folderRes.json(); if (fd.files && fd.files.length) folderId = fd.files[0].id; }
      if (!folderId) {
        const fRes = await fetch('https://www.googleapis.com/drive/v3/files', {
          method: 'POST', headers: H,
          body: JSON.stringify({ name: 'KaliteX Database', mimeType: 'application/vnd.google-apps.folder' })
        });
        if (!fRes.ok) throw new Error('Klasör oluşturulamadı: ' + fRes.status);
        folderId = (await fRes.json()).id;
      }

      // 2. Klasördeki tüm Sheets dosyalarını TEK çağrıda al — id + name (fallback için)
      const allFilesRes = await fetch(
        'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(`'${folderId}' in parents and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`) + '&fields=files(id,name)&pageSize=1000',
        { headers: H }
      );
      const existingIds = new Set();   // id seti — log doğrulama
      const driveByName = {};           // isim→id — duplicate önleme
      if (allFilesRes.ok) {
        (await allFilesRes.json()).files?.forEach(f => { existingIds.add(f.id); driveByName[f.name] = f.id; });
      }

      // 3. Yedek logu yükle
      const log = kxLoadLog();

      // 4. Formları çek
      let forms = kfGetForms();
      if (navigator.onLine) { const s = await kfSbSync(); if (s) forms = s; }

      const TABLE_HDR = KX_FORM_TABLE_HDR;
      let written = 0, skipped = 0, lastSsId = null;

      // 5. Her form: değişmediyse ve Drive dosyası hâlâ varsa atla
      for (const f of forms) {
        const lk = log[f.id];
        const fileOk = lk?.fileId && existingIds.has(lk.fileId);
        const stamp = f.updatedAt || f.savedAt || '';
        if (fileOk && lk.updatedAt === stamp) { skipped++; lastSsId = lastSsId || lk.fileId; continue; }

        const title = String(f.name || 'Form').replace(/[\\\/\?\*\[\]\:]/g, '-').trim().substring(0, 100) || 'Form';
        const n = kfFormGetNotes(f);
        const rows = kxBuildFormSheetRows(f);

        // Drive'da aynı isimli dosya varsa yeni oluşturma — log'u o dosyayla güncelle
        let ssId;
        if (fileOk) {
          ssId = lk.fileId;
        } else if (driveByName[title]) {
          ssId = driveByName[title];
        } else {
          ssId = await kxCreate(H, folderId, title, 'Veri');
          driveByName[title] = ssId; // sonraki iterasyonlarda aynı isimle tekrar oluşturma
        }
        await kxWrite(H, ssId, 'Veri', rows, 7, 6, 1);
        log[f.id] = { updatedAt: stamp, fileId: ssId };
        lastSsId = ssId;
        written++;
      }

      // 6. Kalite Havuzu — hash değişmediyse ve dosya varsa atla
      const khHeader = [...KH_FIXED, ...KH_MODELS.map(m => m.label)];
      const khRows = [khHeader];
      for (let ri = 0; ri < KH.TOTAL_ROWS; ri++) {
        const fixed = KH.paramData[ri] || new Array(KH_FIXED.length).fill('');
        if (!fixed[0]) continue;
        khRows.push([...fixed, ...KH_MODELS.map(m => khMVal(m.id, ri))]);
      }
      const khHash = kxHash(khRows.flat().join('|'));
      const khLog = log['__KH__'];
      const khOk = khLog?.fileId && existingIds.has(khLog.fileId);
      if (!khOk || khLog.hash !== khHash) {
        // Drive'da 'Kalite Havuzu' adlı dosya varsa onu kullan, yeni oluşturma
        let khSsId;
        if (khOk) {
          khSsId = khLog.fileId;
        } else if (driveByName['Kalite Havuzu']) {
          khSsId = driveByName['Kalite Havuzu'];
        } else {
          khSsId = await kxCreate(H, folderId, 'Kalite Havuzu', 'Parametreler');
        }
        await kxWrite(H, khSsId, 'Parametreler', khRows, 0, khHeader.length, 0);
        log['__KH__'] = { hash: khHash, fileId: khSsId };
      }

      // 7. Logu kaydet
      kxSaveLog(log);

      const now = new Date().toLocaleString('tr-TR');
      const msg = written
        ? ('✓ ' + written + ' yeni/güncellendi' + (skipped ? ' · ' + skipped + ' atlandı' : '') + '  —  ' + now)
        : ('✓ Tüm veriler güncel, değişiklik yok  —  ' + now);
      kfToast(msg);
      if (lastSsId) setTimeout(() => window.open('https://docs.google.com/spreadsheets/d/' + lastSsId, '_blank'), 600);
    } catch (e) {
      _kxDriveTokenBackup = null;
      kfToast('Yedekleme hatası: ' + (e.message || e));
      console.error('[KaliteX] Drive export:', e);
    } finally {
      if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    }
  }

  function kfHEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function kfGetForms() { try { return JSON.parse(localStorage.getItem('kf_saved_forms')||'[]'); } catch(e) { return []; } }
  function kfSvForms(f) { localStorage.setItem('kf_saved_forms', JSON.stringify(f)); }
  function kfGenId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  let _kfSavingToCloud = false;

  // ── Kaydedilmemiş değişiklik tespiti ────────────────────────────────────────
  // kfDoLoad ve kfDoSave sonrası snapshot alınır; ⟳ basılınca karşılaştırılır
  window._kfCleanSnapshot = null;
  function kfTakeSnapshot() {
    window._kfCleanSnapshot = JSON.stringify({ d: window.kfData || [], n: window.kfNotes || {} });
  }
  function kfHasUnsavedChanges() {
    if (!window.kfCurrentSaveId) return false;
    if (!window._kfCleanSnapshot) return false;
    return window._kfCleanSnapshot !== JSON.stringify({ d: window.kfData || [], n: window.kfNotes || {} });
  }

  function kfSyncStatus(s) {
    const el = document.getElementById('kf-sync-st');
    if (!el) return;
    const map = {
      idle: '',
      syncing: '⟳ Form Supabase\'e yazılıyor... Kapatmayın',
      ok: '☁️ Form senkron',
      error: '⚠️ Form bulut yazma hatası',
      offline: '📴 Form sadece yerel kaydedildi'
    };
    const col = {
      idle: '#6b7280',
      syncing: '#d97706',
      ok: '#16a34a',
      error: '#dc2626',
      offline: '#6b7280'
    };
    el.textContent = map[s] || '';
    el.style.color = col[s] || '#6b7280';
  }

  // Supabase yazımı sürerken sayfanın erken kapanmasını engelle
  window.addEventListener('beforeunload', function(e) {
    if (!_kfSavingToCloud) return;
    e.preventDefault();
    e.returnValue = '';
  });

  // ── Supabase form sync ───────────────────────────────────────────────────────
  // Tek bir formu Supabase'e UPSERT'le (editor girişi gerekli)
  async function kfSbUpsertForm(entry) {
    if (!isEditor()) return false;
    try {
      await sbUpsert('kf_forms', {
        id: entry.id,
        name: entry.name,
        model_id: entry.modelId || '',
        model_label: entry.modelLabel || '',
        saved_at: entry.savedAt,
        updated_at: new Date().toISOString(),
        data: kfPackFormPayload(entry.data, entry.notes)
      }, 'id');
      return true;
    } catch(e) { console.warn('[KaliteX] kf_forms UPSERT hatası:', e.message||e); }
    return false;
  }

  // Tek bir formu Supabase'den sil (editor girişi gerekli)
  async function kfSbDeleteForm(id) {
    if (!isEditor()) return;
    try {
      await sbDel('kf_forms', 'id=eq.' + encodeURIComponent(id));
    } catch(e) { console.warn('[KaliteX] kf_forms DELETE hatası:', e.message||e); }
  }

  function kfMergeFormRows(rows, local) {
    const merged = {};
    local.forEach(f => { merged[f.id] = f; });
    rows.forEach(r => {
      const unpacked = kfUnpackFormPayload(r.data);
      const sbEntry = {
        id: r.id, name: r.name,
        modelId: r.model_id, modelLabel: r.model_label,
        savedAt: r.saved_at, updatedAt: r.updated_at,
        data: unpacked.rows,
        notes: unpacked.notes
      };
      const loc = merged[r.id];
      if (!loc) {
        merged[r.id] = sbEntry;
      } else {
        const sbTime = new Date(r.updated_at || r.saved_at).getTime();
        const locTime = new Date(loc.updatedAt || loc.savedAt).getTime();
        merged[r.id] = sbTime > locTime ? sbEntry : loc;
      }
    });
    return Object.values(merged).sort((a,b) => new Date(b.savedAt)-new Date(a.savedAt));
  }

  // Yükle modalı için: sadece çek, Supabase'e yazma (editör girişinde modal bozulmasın)
  async function kfSbFetchForms() {
    if (!navigator.onLine) return kfGetForms();
    try {
      const rows = await sbGet('kf_forms', 'select=id,name,model_id,model_label,saved_at,updated_at,data&order=updated_at.desc');
      const finalList = kfMergeFormRows(rows, kfGetForms());
      kfSvForms(finalList);
      return finalList;
    } catch(e) {
      console.warn('[KaliteX] kf_forms fetch hatası:', e.message||e);
      return kfGetForms();
    }
  }

  // Tüm formları Supabase'den çek, localStorage ile merge et
  // Kural: her id için updated_at daha yeni olan kazanır
  async function kfSbSync() {
    if (!navigator.onLine) return;
    try {
      const rows = await sbGet('kf_forms', 'select=id,name,model_id,model_label,saved_at,updated_at,data&order=updated_at.desc');
      const local = kfGetForms();
      const finalList = kfMergeFormRows(rows, local);
      // Local'de Supabase'den daha yeni veya hiç olmayan → editor ise Supabase'e gönder
      if (isEditor()) {
        const sbTimestamps = new Map(rows.map(r => [r.id, new Date(r.updated_at || r.saved_at).getTime()]));
        for (const f of local) {
          const sbTime = sbTimestamps.get(f.id);
          const locTime = new Date(f.updatedAt || f.savedAt).getTime();
          if (sbTime === undefined || locTime > sbTime) await kfSbUpsertForm(f);
        }
      }
      kfSvForms(finalList);
      return finalList;
    } catch(e) {
      console.warn('[KaliteX] kf_forms sync hatası:', e.message||e);
      return null;
    }
  }

  function kfToast(msg) {
    const t = document.getElementById('kf-toast-global') || document.getElementById('kf-toast');
    if (!t) return;
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', 2200);
  }

  function kfModalClose() {
    const o = document.getElementById('kf-modal-overlay');
    if (o) o.style.display = 'none';
  }

  // Escape ile not modalını kapat
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const no = document.getElementById('kf-notes-overlay');
      if (no && no.style.display === 'flex') { kfNotesClose(); e.stopPropagation(); }
    }
  }, true);

  function kfSetSaveName(name) {
    const slbl = document.getElementById('kf-save-name');
    if (!slbl) return;
    const short = name.split('-')[0].trim();
    const editHint = isEditor() ? ' title="Çift tıkla: adı düzenle" style="cursor:pointer;"' : '';
    const dblclick = isEditor() ? ' ondblclick="kfRenameForm()"' : '';
    slbl.innerHTML = `<span class="kfsn-full"${editHint}${dblclick}>💾 ${kfHEsc(name)}</span><span class="kfsn-short"${editHint}${dblclick}>💾 ${kfHEsc(short)}</span>`;
    slbl.style.display = 'inline-flex';
  }

  function kfRenameForm() {
    if (!isEditor() || !window.kfCurrentSaveId) return;
    // Mevcut adı önceden doldur, "farklı kaydet" modunu kapat → sadece adı günceller
    window._fnkbForceNew = false;
    _fnkb.val = window.kfCurrentSaveName || '';
    kfShowSaveModal(false);
  }

  // ── Form Adı Özel Klavye ───────────────────────────────────────────────
  const _fnkb = { val: '', maxlen: 60 };
  const _TR_UP = {'i':'İ','ı':'I','ğ':'Ğ','ü':'Ü','ş':'Ş','ö':'Ö','ç':'Ç'};

  function fnkbRender() {
    const disp = document.getElementById('kfmkb-disp');
    const cnt  = document.getElementById('kfmkb-cnt');
    if (disp) disp.textContent = _fnkb.val || '—';
    if (cnt)  cnt.textContent  = _fnkb.val.length + '/60';
  }

  function fnkbType(k) {
    const kb = _fnkb;
    if (k === 'BS') { kb.val = kb.val.slice(0,-1); }
    else if (k === 'SP') { if (kb.val.length < kb.maxlen) kb.val += ' '; }
    else if (k === 'OK') { fnkbConfirm(); return; }
    else {
      if (kb.val.length >= kb.maxlen) return;
      // Her zaman büyük harf
      kb.val += (_TR_UP[k] || k.toUpperCase());
    }
    fnkbRender();
    const inp = document.getElementById('kfm-name-inp');
    if (inp) inp.value = kb.val;
  }

  function fnkbConfirm() {
    const name = _fnkb.val.trim();
    if (!name) {
      const disp = document.getElementById('kfmkb-disp');
      if (disp) { disp.style.background='#7f1d1d'; setTimeout(()=>{ disp.style.background='#1f2937'; },600); }
      return;
    }
    if (!kfRequireModel()) return;
    kfDoSave(name, window._fnkbForceNew);
    // Model geçişi bekliyorsa kayıt bitti — şimdi yeni modeli temiz aç
    if (window._kfPendingModelId) {
      const target = window._kfPendingModelId;
      window._kfPendingModelId = null;
      const targetLabel = (KH_MODELS.find(m => m.id === target) || {label: target}).label;
      kfToast('✓ Kaydedildi — ' + targetLabel + ' formu açılıyor…');
      window.kfData = []; // Eski cevapları taşıma
      kfLoadModel(target);
    }
  }

  function kfShowSaveModal(forceNew) {
    if (!kfRequireModel()) return;
    const overlay = document.getElementById('kf-modal-overlay');
    const box = document.getElementById('kf-modal-box');
    if (!overlay || !box) return;
    window._fnkbForceNew = forceNew;
    _fnkb.val = window.kfCurrentSaveName || '';
    const rows = [
      ['Q','W','E','R','T','Y','U','İ','O','P','Ğ','Ü'],
      ['A','S','D','F','G','H','J','K','L','Ş','I'],
      ['Z','X','C','V','B','N','M','Ö','Ç']
    ];
    const numRow = ['1','2','3','4','5','6','7','8','9','0','-'];
    let kbHtml = `<div class="kfm-kb">
      <div class="kfm-kb-disp"><span class="kfm-kb-disp-txt" id="kfmkb-disp">${_fnkb.val||'—'}</span><span class="kfm-kb-disp-cnt" id="kfmkb-cnt">${_fnkb.val.length}/60</span></div>`;
    // Rakam + tire satırı (en üste)
    kbHtml += '<div class="kfm-kb-row">';
    numRow.forEach(k => { kbHtml += `<button class="kfm-kbk" onclick="fnkbType('${k}')">${k}</button>`; });
    kbHtml += '</div>';
    // Harf satırları
    rows.forEach((row, ri) => {
      kbHtml += '<div class="kfm-kb-row">';
      row.forEach(k => { kbHtml += `<button class="kfm-kbk" onclick="fnkbType('${k}')">${k}</button>`; });
      if (ri === 2) kbHtml += `<button class="kfm-kbk kfm-kbk-sp" style="min-width:50px;flex:1.5;" onclick="fnkbType('BS')">⌫</button>`;
      kbHtml += '</div>';
    });
    // Boşluk + Kaydet
    kbHtml += `<div class="kfm-kb-row"><button class="kfm-kbk kfm-kbk-sp" style="flex:4;" onclick="fnkbType('SP')">BOŞLUK</button><button class="kfm-kbk kfm-kbk-ok" style="min-width:90px;flex:2;" onclick="fnkbType('OK')">✓ Kaydet</button></div>`;
    kbHtml += '</div>';
    box.innerHTML = `
      <div class="kfm-title">💾 Formu Kaydet</div>
      <input id="kfm-name-inp" type="hidden" value="${_fnkb.val}">
      ${kbHtml}
      <div class="kfm-btns">
        <button class="kfm-cancel" onclick="kfModalClose()">İptal</button>
      </div>`;
    overlay.style.display = 'flex';
  }

  async function kfDoSave(name, forceNew) {
    if (!isEditor()) { kfToast('Salt okunur modda kayıt yapılamaz.'); return; }
    if (!kfRequireModel()) return;
    name = (name || '').trim();
    if (!name) { const i = document.getElementById('kfm-name-inp'); if (i) { i.style.borderColor='#dc2626'; i.focus(); } return; }
    const forms = kfGetForms();
    const id = (!forceNew && window.kfCurrentSaveId) ? window.kfCurrentSaveId : kfGenId();
    const idx = forms.findIndex(f => f.id === id);
    const now = new Date().toISOString();
    const entry = { id, name, modelId: window.kfCurrentModel||'', modelLabel: window.kfCurrentModelLabel||'', savedAt: now, updatedAt: now, data: JSON.parse(JSON.stringify(window.kfData||[])), notes: JSON.parse(JSON.stringify(window.kfNotes||{aksilikler:[],revizeler:[]})) };
    if (idx >= 0) { entry.savedAt = forms[idx].savedAt || now; forms[idx] = entry; } else forms.push(entry);
    kfSvForms(forms);
    window.kfCurrentSaveId = id; window.kfCurrentSaveName = name;
    kfTakeSnapshot(); // kayıt anını "temiz hal" olarak işaretle
    const slbl = document.getElementById('kf-save-name');
    if (slbl) kfSetSaveName(name);
    kfModalClose();
    // Supabase yazımı bitene kadar kullanıcıyı bilgilendir
    if (!navigator.onLine) {
      kfSyncStatus('offline');
      kfToast('Form yerel kaydedildi (offline) ✓');
      return;
    }

    _kfSavingToCloud = true;
    kfSyncStatus('syncing');
    kfToast('Supabase\'e yaziliyor, lutfen kapatmayin...');
    try {
      const ok = await kfSbUpsertForm(entry);
      if (ok) {
        kfSyncStatus('ok');
        kfToast('Form kaydedildi ve Supabase\'e yazildi ✓');
      } else {
        kfSyncStatus('error');
        kfToast('Form kaydedildi ama Supabase\'e yazilamadi ⚠️');
      }
    } finally {
      _kfSavingToCloud = false;
    }
  }

  function kfToggleLoadGroup(hdr) {
    const group = hdr.closest('.kfm-group');
    if (!group) return;
    group.classList.toggle('open');
  }

  async function kfShowLoadModal() {
    const overlay = document.getElementById('kf-modal-overlay');
    const box = document.getElementById('kf-modal-box');
    if (!overlay || !box) return;
    // Önce modalı aç, yükleniyor göster
    box.innerHTML = `<div class="kfm-title">&#128194; Kay&#305;tl&#305; Formlar</div><div class="kfm-empty" style="padding:32px 0;text-align:center;color:#9ca3af;">&#8635; Yükleniyor...</div>`;
    overlay.style.display = 'flex';
    // Supabase ile sync
    let forms;
    if (navigator.onLine) {
      const synced = await kfSbFetchForms();
      forms = synced || kfGetForms();
    } else {
      forms = kfGetForms();
    }
    // Modalı render et
    let list = '';
    if (!forms.length) {
      list = '<div class="kfm-empty">Kay&#305;tl&#305; form bulunamad&#305;.</div>';
    } else {
      const groups = {};
      if (typeof KH_MODELS !== 'undefined') {
        KH_MODELS.forEach(m => { groups[m.id] = { label: m.label, forms: [] }; });
      }
      groups['__none__'] = { label: 'Model Belirtilmemiş', forms: [] };
      [...forms].sort((a,b) => new Date(b.savedAt)-new Date(a.savedAt)).forEach(f => {
        const key = f.modelId || '__none__';
        if (!groups[key]) groups[key] = { label: f.modelLabel || 'Model Belirtilmemiş', forms: [] };
        groups[key].forms.push(f);
      });
      const sortedKeys = (typeof KH_MODELS !== 'undefined')
        ? KH_MODELS.map(m => m.id).concat(Object.keys(groups).filter(k => k !== '__none__' && !KH_MODELS.find(m => m.id === k)))
        : Object.keys(groups);
      if (groups['__none__']?.forms.length) sortedKeys.push('__none__');
      sortedKeys.forEach((key) => {
        const g = groups[key];
        if (!g || !g.forms.length) return;
        let items = '';
        g.forms.forEach(f => {
          const dt = new Date(f.savedAt);
          const ds = dt.toLocaleDateString('tr-TR') + ' ' + dt.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
          const syncIcon = f.updatedAt ? '🌐' : '📴';
          const delBtn = isEditor()
            ? `<button class="kfm-del" onclick="event.stopPropagation();kfConfirmDelete('${f.id}')">Sil</button>`
            : '';
          items += `<div class="kfm-item" onclick="kfDoLoad('${f.id}')"><div class="kfm-item-info"><div class="kfm-item-name">${kfHEsc(f.name)}</div><div class="kfm-item-meta">${syncIcon} ${ds}</div></div>${delBtn}</div>`;
        });
        list += `<div class="kfm-group">
          <div class="kfm-group-hdr" onclick="kfToggleLoadGroup(this)">
            <span class="kfm-group-name">${kfHEsc(g.label)}</span>
            <span style="display:flex;align-items:center;gap:6px;flex-shrink:0;"><span class="kfm-group-count">${g.forms.length}</span><span class="kfm-group-chevron">▾</span></span>
          </div>
          <div class="kfm-group-body">${items}</div>
        </div>`;
      });
      if (!list) list = '<div class="kfm-empty">Kay&#305;tl&#305; form bulunamad&#305;.</div>';
    }
    const exportBtn = isEditor()
      ? `<button class="kfm-export" title="Sadece se\u00e7ti\u011finiz QUALITY FORMS klas\u00f6r\u00fcne yazar (dar izin). \u0130lk seferde klas\u00f6r se\u00e7ilir." onclick="kfExportAllForms()">&#128228; D&#305;&#351;ar&#305; Aktar</button>`
      : `<span></span>`;
    box.innerHTML = `<div class="kfm-title">&#128194; Kay&#305;tl&#305; Formlar <span style="font-size:11px;font-weight:600;color:#6b7280;">(${forms.length})</span></div><div class="kfm-list" style="gap:8px;">${list}</div><div class="kfm-btns" style="justify-content:space-between;">${exportBtn}<button class="kfm-cancel" onclick="kfModalClose()">Kapat</button></div>`;
  }

  function kfDoLoad(id) {
    const forms = kfGetForms();
    const f = forms.find(f => f.id === id);
    if (!f) return;
    window.kfCurrentSaveId = f.id; window.kfCurrentSaveName = f.name;
    window.kfCurrentModel = f.modelId; window.kfCurrentModelLabel = f.modelLabel;
    window.kfData = JSON.parse(JSON.stringify(kfFormGetRows(f)));
    window.kfNotes = kfFormGetNotes(f);
    const selLbl = document.getElementById('model-select-label');
    if (selLbl) selLbl.textContent = f.modelLabel || 'Model Seç';
    const slbl = document.getElementById('kf-save-name');
    if (slbl) kfSetSaveName(f.name);
    const tbody = document.getElementById('kf-tbody');
    if (tbody && typeof window.kfBuildRows === 'function') tbody.innerHTML = window.kfBuildRows();
    kfTakeSnapshot(); // yükleme anını "temiz hal" olarak işaretle
    kfModalClose();
    kfNotesUpdateBadge();
    kfToast(f.name + ' y\u00fcklendi \u2713');
  }

  async function kfDeleteForm(id) {
    if (!isEditor()) { kfToast('Salt okunur modda silinemez.'); return; }
    const expected = window._kfDelTarget;
    const inp = document.getElementById('kf-del-inp');
    if (!expected || expected.id !== id) { kfToast('Silme doğrulaması geçersiz.'); return; }
    if (!inp || inp.value.trim() !== expected.name.trim()) { kfToast('Form adı eşleşmiyor.'); return; }
    window._kfDelTarget = null;
    let forms = kfGetForms();
    forms = forms.filter(f => f.id !== id);
    kfSvForms(forms);
    if (window.kfCurrentSaveId === id) {
      window.kfCurrentSaveId = null; window.kfCurrentSaveName = '';
      const slbl = document.getElementById('kf-save-name');
      if (slbl) slbl.style.display = 'none';
    }

  async function hardRefreshApp() {
    const _btn = document.querySelector('button[onclick="hardRefreshApp()"]');
    const _btnDisable = () => { if (_btn) { _btn.style.opacity = '0.4'; _btn.style.pointerEvents = 'none'; } };
    const _btnEnable  = () => { if (_btn) { _btn.style.opacity = ''; _btn.style.pointerEvents = ''; } };

    // ── Kalite Formu sayfası: Supabase'den son formları çek, ekranı güncelle ─
    if (currentPage === 'kalite-formu') {
      if (_kfSavingToCloud) { kfToast('Supabase yazimi suruyor, lutfen tamamlanmasini bekleyin.'); return; }
      if (!navigator.onLine) { kfToast('İnternet bağlantısı yok.'); return; }

      // Kaydedilmemiş değişiklik varsa kullanıcıyı uyar
      if (kfHasUnsavedChanges()) {
        const devam = window.confirm(
          'Formda kaydedilmemiş değişiklikler var.\n' +
          'Yenilersen bu değişiklikler kaybolur, Supabase\'deki son hal gelir.\n\n' +
          'Devam edilsin mi?'
        );
        if (!devam) return;
      }

      _btnDisable();
      kfSyncStatus('syncing');
      try {
        const forms = await kfSbSync(); // localStorage + Supabase merge → güncel liste

        // Açık form varsa ekrandaki veriyi de güncelle
        if (window.kfCurrentSaveId && Array.isArray(forms)) {
          const updated = forms.find(f => f.id === window.kfCurrentSaveId);
          if (updated) {
            const unpacked = kfUnpackFormPayload(updated.data, updated.notes);
            window.kfData  = unpacked.rows;
            window.kfNotes = unpacked.notes;
            window.kfCurrentSaveName = updated.name;
            const tbody = document.getElementById('kf-tbody');
            if (tbody && typeof window.kfBuildRows === 'function') tbody.innerHTML = window.kfBuildRows();
            kfSetSaveName(updated.name);
            kfNotesUpdateBadge();
            kfTakeSnapshot(); // yeni temiz hal
            kfToast('Form güncellendi ✓');
          } else {
            kfToast('Form listesi güncellendi ✓');
          }
        } else {
          kfToast('Form listesi güncellendi ✓');
        }
        kfSyncStatus('ok');
      } catch(e) {
        kfSyncStatus('error');
        kfToast('⚠️ Güncelleme hatası: ' + (e.message || e));
      } finally {
        _btnEnable();
      }
      return;
    }

    // ── Kalite Havuzu / Model sayfası: Supabase'den yenile, sayfa yenileme yok ──
    const _isModelPage = typeof KH_MODELS !== 'undefined' && KH_MODELS.some(m => m.id === currentPage);
    if (currentPage === 'kalite-havuzu' || _isModelPage) {
      if (_khSyncing) { khToast('Bulut senkronu suruyor, lutfen bekleyin.', 1800); return; }
      _btnDisable();
      try { await khForceReload(); } finally { _btnEnable(); }
      return;
    }

    // ── Diğer sayfalar: cache temizle + hard reload ──────────────────────────
    try {
      if (_kfSavingToCloud) { kfToast('Supabase yazimi suruyor, lutfen tamamlanmasini bekleyin.'); return; }
      if (_khSyncing) { khToast('Bulut senkronu suruyor, lutfen bekleyin.', 1800); return; }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
    } catch(e) {
      console.warn('[KaliteX] Hard refresh hazirlik hatasi:', e);
    } finally {
      const u = new URL(window.location.href);
      u.searchParams.set('hr', Date.now().toString());
      window.location.replace(u.toString());
    }
  }

  window._rpFilters = { period: 'month', modelId: '', kaynakci: '', montajci: '' };
  window._rpActiveTab = 'list';
  window._rpForms = [];

  function rpDateRange() {
    const now = new Date(); now.setHours(23,59,59,999);
    const from = new Date(now);
    const p = window._rpFilters.period;
    if (p === 'week')        from.setDate(from.getDate() - 7);
    else if (p === 'month')  from.setMonth(from.getMonth() - 1);
    else if (p === '3month') from.setMonth(from.getMonth() - 3);
    else                     from.setFullYear(2000);
    from.setHours(0,0,0,0);
    return { from, to: now };
  }

  function rpApplyFilters(forms) {
    const { from, to } = rpDateRange();
    return forms.filter(f => {
      const d = new Date(f.savedAt || f.updatedAt || 0);
      if (d < from || d > to) return false;
      if (window._rpFilters.modelId && f.modelId !== window._rpFilters.modelId) return false;
      if (window._rpFilters.kaynakci && rpGetKaynakci(f) !== window._rpFilters.kaynakci) return false;
      if (window._rpFilters.montajci && rpGetMontajci(f) !== window._rpFilters.montajci) return false;
      return true;
    });
  }

  function rpGetKaynakci(form) {
    const row = kfFormGetRows(form).find(r => r[0] === 'K9011');
    return row ? String(row[3] || '') : '';
  }
  function rpGetMontajci(form) {
    const row = kfFormGetRows(form).find(r => r[0] === 'K9012');
    return row ? String(row[3] || '') : '';
  }

  function rpAnalyzeForm(form) {
    const dataRows = kfFormGetRows(form).filter(r => r[6] === 1);
    const tRows = dataRows.filter(r => (r[7] || '').toUpperCase().trim() === 'T');
    const evet  = tRows.filter(r => r[3] === 'EVET').length;
    const hata  = tRows.filter(r => r[3] === 'HAYIR').length;
    const kd    = tRows.filter(r => r[3] === 'KD').length;
    const total = tRows.length;
    const graded = evet + hata; // geçme oranı yalnızca EVET + HAYIR üzerinden (KD hariç)
    const passRate = graded > 0 ? Math.round(evet / graded * 100) : null;
    return { evet, hata, hayir: hata, kd, total, graded, passRate,
      kaynakci:  rpGetKaynakci(form),
      montajci:  rpGetMontajci(form),
      hasAksilik: (form.notes?.aksilikler || []).length > 0 };
  }

  function rpRefresh() {
    if (currentPage !== 'rapor') return;
    const filtered = rpApplyFilters(window._rpForms);
    rpRenderKPIs(filtered);
    rpPopPersonelFilt();
    rpRenderTab(filtered);
  }

  function rpRenderKPIs(filtered) {
    const el = document.getElementById('rp-kpis'); if (!el) return;
    let sumP=0, cntP=0, hataF=0, aksilikF=0, toplamHata=0;
    filtered.forEach(f => {
      const a = rpAnalyzeForm(f);
      if (a.passRate !== null) { sumP += a.passRate; cntP++; }
      if (a.hata > 0) hataF++;
      if (a.hasAksilik) aksilikF++;
      toplamHata += a.hata;
    });
    const avg = cntP > 0 ? Math.round(sumP / cntP) : null;
    const ac = avg===null?'#9ca3af':avg>=80?'#16a34a':avg>=60?'#d97706':'#dc2626';
    el.innerHTML = `
      <div class="rp-kpi rp-kpi-a"><div class="rp-kpi-v">${filtered.length}</div><div class="rp-kpi-l">Toplam Form</div><div class="rp-kpi-s">Seçili dönem</div></div>
      <div class="rp-kpi rp-kpi-g"><div class="rp-kpi-v" style="color:${ac}">${avg!==null?'%'+avg:'—'}</div><div class="rp-kpi-l">Ort. Geçme</div><div class="rp-kpi-s">EVET / (EVET + HAYIR)</div></div>
      <div class="rp-kpi rp-kpi-r"><div class="rp-kpi-v" style="color:${hataF>0?'#dc2626':'#16a34a'}">${hataF}</div><div class="rp-kpi-l">Hatalı Form</div><div class="rp-kpi-s">HAYIR içeren</div></div>
      <div class="rp-kpi rp-kpi-o"><div class="rp-kpi-v" style="color:${toplamHata>0?'#d97706':'#16a34a'}">${toplamHata}</div><div class="rp-kpi-l">Toplam Hata</div><div class="rp-kpi-s">Tüm formlardaki HAYIR</div></div>`;
  }

    if (ksel) ksel.innerHTML = '<option value="">Tüm Kaynakçılar</option>' + ks.map(k=>`<option value="${k}"${window._rpFilters.kaynakci===k?' selected':''}>${k}</option>`).join('');
    if (msel) msel.innerHTML = '<option value="">Tüm Montajcılar</option>' + ms.map(k=>`<option value="${k}"${window._rpFilters.montajci===k?' selected':''}>${k}</option>`).join('');

  function rpRenderTab(filtered) {
    const p = document.getElementById('rp-panel'); if (!p) return;
    if (window._rpActiveTab === 'list')         rpTabList(p, filtered);
    else if (window._rpActiveTab === 'param')   rpTabParam(p, filtered);
    else if (window._rpActiveTab === 'model')   rpTabModel(p, filtered);
    else if (window._rpActiveTab === 'personel')rpTabPersonel(p, filtered);

  function rpTabList(panel, filtered) {
    if (!filtered.length) { panel.innerHTML = '<div class="rp-empty">📋 Bu dönemde kayıtlı form yok.</div>'; return; }
    const rows = [...filtered].sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt)).map(f => {
      const a = rpAnalyzeForm(f);
      const tarih = new Date(f.savedAt||f.updatedAt).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
      const pb = a.passRate===null?'<span class="rp-bdg rp-bdg-b">—</span>'
        :a.passRate>=90?`<span class="rp-bdg rp-bdg-g">%${a.passRate}</span>`
        :a.passRate>=70?`<span class="rp-bdg rp-bdg-y">%${a.passRate}</span>`
        :`<span class="rp-bdg rp-bdg-r">%${a.passRate}</span>`;
      const dur = a.hata>0?`<span class="rp-bdg rp-bdg-r">${a.hata} Hata</span>`
        :a.total>0?'<span class="rp-bdg rp-bdg-g">TAMAM</span>':'<span class="rp-bdg rp-bdg-b">BOŞ</span>';
      return `<tr onclick="rpShowDetail('${f.id}')">
        <td style="color:#6b7280;">${tarih}</td>
        <td style="font-weight:600;">${f.modelLabel||'—'}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name||'—'}</td>
        <td style="white-space:nowrap;">${a.kaynakci||'—'}</td>
        <td style="white-space:nowrap;">${a.montajci||'—'}</td>
        <td>${pb}</td><td>${dur}</td>
        <td style="text-align:center;">${a.hasAksilik?'⚠️':''}</td></tr>`;
    }).join('');
    panel.innerHTML = `<table class="rp-tbl"><thead><tr>
      <th>Tarih</th><th>Model</th><th>Form / Seri No</th><th>Kaynakçı</th><th>Montajcı</th><th>Geçme %</th><th>Durum</th><th style="text-align:center;">⚠️</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
  }

  function rpTabParam(panel, filtered) {
    const map = {};
    filtered.forEach(f => {
      kfFormGetRows(f).filter(r => r[6] === 1 && (r[7] || '').toUpperCase().trim() === 'T').forEach(r => {
        if (!r[0]) return;
        if (!map[r[0]]) map[r[0]] = { aciklama: r[1] || r[0], hayir: 0, graded: 0 };
        if (r[3] === 'HAYIR') { map[r[0]].hayir++; map[r[0]].graded++; }
        else if (r[3] === 'EVET') map[r[0]].graded++;
      });
    });
    const items = Object.entries(map).filter(([, v]) => v.hayir > 0).sort((a, b) => b[1].hayir - a[1].hayir).slice(0, 25);
    if (!items.length) { panel.innerHTML = '<div class="rp-empty">✅ Seçili dönemde HAYIR kaydı yok.</div>'; return; }
    const mx = items[0][1].hayir;
    panel.innerHTML = `<div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:14px;">En fazla HAYIR alan parametreler (ilk 25)</div>` +
      items.map(([kod, v]) => {
        const pct = Math.round(v.hayir / mx * 100);
        const rate = v.graded > 0 ? Math.round(v.hayir / v.graded * 100) : 0;
        const color = rate>=50?'#dc2626':rate>=25?'#f59e0b':'#fca5a5';
        return `<div class="rp-bar">
          <div class="rp-bar-l" title="[${kod}] ${v.aciklama}">[${kod}] ${v.aciklama}</div>
          <div class="rp-bar-t"><div class="rp-bar-f" style="width:${pct}%;background:${color};"></div></div>
          <div class="rp-bar-n" style="color:${color};">${v.hayir}x</div>
          <span style="font-size:10px;color:#9ca3af;min-width:38px;">(%${rate})</span></div>`;
      }).join('');
  }

  function rpTabModel(panel, filtered) {
    const map = {};
    filtered.forEach(f => {
      const key = f.modelId||'__'; const lbl = f.modelLabel||'—';
      if (!map[key]) map[key] = { lbl, rates:[] };
      const a = rpAnalyzeForm(f);
      if (a.passRate !== null) map[key].rates.push(a.passRate);
    });
    const items = Object.values(map).filter(v=>v.rates.length).map(v=>(
      { lbl:v.lbl, avg:Math.round(v.rates.reduce((s,r)=>s+r,0)/v.rates.length), cnt:v.rates.length }
    )).sort((a,b)=>b.avg-a.avg);
    if (!items.length) { panel.innerHTML = '<div class="rp-empty">📊 Yeterli veri yok.</div>'; return; }
    panel.innerHTML = `<div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:14px;">Model bazında ortalama geçme oranı</div>` +
      items.map(v => {
        const color = v.avg>=90?'#16a34a':v.avg>=70?'#d97706':'#dc2626';
        return `<div class="rp-bar">
          <div class="rp-bar-l">${v.lbl}</div>
          <div class="rp-bar-t"><div class="rp-bar-f" style="width:${v.avg}%;background:${color};"></div></div>
          <div class="rp-bar-n" style="color:${color};">%${v.avg}</div>
          <span style="font-size:10px;color:#9ca3af;min-width:50px;">(${v.cnt} form)</span></div>`;
      }).join('');
  }

  function rpTabPersonel(panel, filtered) {
    // Kaynakçı ve montajcı bazında hata/geçme istatistiği
    const kayMap = {}, monMap = {};
    filtered.forEach(f => {
      const a = rpAnalyzeForm(f);
      const lbl = f.modelLabel || '—';
      const addTo = (map, isim) => {
        if (!isim) return;
        if (!map[isim]) map[isim] = { formSayisi: 0, toplamHata: 0, toplamEvet: 0, toplamGraded: 0, makineler: {} };
        map[isim].formSayisi++;
        map[isim].toplamHata += a.hata;
        map[isim].toplamEvet += a.evet;
        map[isim].toplamGraded += a.graded;
        if (!map[isim].makineler[f.modelId||'__']) map[isim].makineler[f.modelId||'__'] = { lbl, sayi:0, hata:0 };
        map[isim].makineler[f.modelId||'__'].sayi++;
        map[isim].makineler[f.modelId||'__'].hata += a.hata;
      };
      addTo(kayMap, a.kaynakci);
      addTo(monMap, a.montajci);
    });

    const rpPersonelBlock = (title, color, map, rol) => {
      const items = Object.entries(map).sort((a, b) => {
        const ar = a[1].toplamGraded > 0 ? a[1].toplamHata / a[1].toplamGraded : 0;
        const br = b[1].toplamGraded > 0 ? b[1].toplamHata / b[1].toplamGraded : 0;
        return br - ar;
      });
      if (!items.length) return `<div style="color:#9ca3af;font-size:12px;padding:8px 0;">Veri yok.</div>`;
      return items.map(([isim, d]) => {
        const basariOrani = d.toplamGraded > 0 ? Math.round(d.toplamEvet / d.toplamGraded * 100) : null;
        const hataOrani   = d.toplamGraded > 0 ? Math.round(d.toplamHata / d.toplamGraded * 100) : 0;
        const bc = basariOrani===null?'#9ca3af':basariOrani>=90?'#16a34a':basariOrani>=70?'#d97706':'#dc2626';
        const makineler = Object.values(d.makineler).sort((a,b)=>b.hata-a.hata)
          .map(m=>`<span style="display:inline-block;background:#f3f4f6;border-radius:4px;padding:2px 7px;font-size:10px;margin:2px;font-weight:600;color:#374151;">${m.lbl} (${m.sayi} form${m.hata>0?', '+m.hata+' hata':''})</span>`).join('');
        const isimEnc = encodeURIComponent(isim);
        return `<div onclick="rpShowPersonelDetail('${isimEnc}','${rol}')" style="border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;" onmouseenter="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.09)'" onmouseleave="this.style.boxShadow=''">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
            <div style="font-size:14px;font-weight:800;color:#111827;flex:1;">${isim} <span style="font-size:10px;color:#9ca3af;font-weight:600;">detay için tıkla</span></div>
            <div style="background:#f9fafb;border-radius:7px;padding:5px 12px;text-align:center;min-width:70px;">
              <div style="font-size:18px;font-weight:900;color:${bc};">${basariOrani!==null?'%'+basariOrani:'—'}</div>
              <div style="font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;">Başarı</div>
            </div>
            <div style="background:#f9fafb;border-radius:7px;padding:5px 12px;text-align:center;min-width:70px;">
              <div style="font-size:18px;font-weight:900;color:${d.toplamHata>0?'#dc2626':'#16a34a'}">${d.toplamHata}</div>
              <div style="font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;">Hata</div>
            </div>
            <div style="background:#f9fafb;border-radius:7px;padding:5px 12px;text-align:center;min-width:70px;">
              <div style="font-size:18px;font-weight:900;color:#374151;">${d.formSayisi}</div>
              <div style="font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;">Form</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <div style="height:8px;flex:1;background:#f3f4f6;border-radius:4px;overflow:hidden;">
              <div style="height:100%;width:${Math.min(hataOrani,100)}%;background:${d.toplamHata>0?'#dc2626':'#16a34a'};border-radius:4px;"></div>
            </div>
            <span style="font-size:10px;color:#9ca3af;min-width:48px;">%${hataOrani} hata</span>
          </div>
          <div>${makineler}</div>
        </div>`;
      }).join('');
    };

    panel.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div>
          <div style="font-size:13px;font-weight:800;color:#dc2626;border-bottom:2px solid #fee2e2;padding-bottom:7px;margin-bottom:12px;">🔥 Kaynakçılar</div>
          ${rpPersonelBlock('Kaynakçı','#dc2626',kayMap,'kaynakci')}
        </div>
        <div>
          <div style="font-size:13px;font-weight:800;color:#2563eb;border-bottom:2px solid #dbeafe;padding-bottom:7px;margin-bottom:12px;">🔧 Montajcılar</div>
          ${rpPersonelBlock('Montajcı','#2563eb',monMap,'montajci')}
        </div>
      </div>
      <style>@media(max-width:640px){.rp-personel-grid{grid-template-columns:1fr!important;}}</style>`;
  }

  function rpShowPersonelDetail(isimEnc, rol) {
    const isim = decodeURIComponent(isimEnc);
    const filtered = rpApplyFilters(window._rpForms);
    // Bu kişinin yer aldığı formları bul
    const forms = filtered.filter(f => {
      const a = rpAnalyzeForm(f);
      return rol === 'kaynakci' ? a.kaynakci === isim : a.montajci === isim;
    }).sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt));

    if (!forms.length) { rpCloseModal(); return; }

    const rolLbl = rol === 'kaynakci' ? '🔥 Kaynakçı' : '🔧 Montajcı';
    const rolRenk = rol === 'kaynakci' ? '#dc2626' : '#2563eb';
    const toplamHata = forms.reduce((s,f) => s + rpAnalyzeForm(f).hata, 0);

    const formBlocks = forms.map(f => {
      const a = rpAnalyzeForm(f);
      const tarih = new Date(f.savedAt||f.updatedAt).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
      // Sadece T tipinde HAYIR olan satırlar
      const hatalar = kfFormGetRows(f).filter(r => r[6]===1 && (r[7]||'').toUpperCase().trim()==='T' && r[3]==='HAYIR');
      const hataHtml = hatalar.length === 0
        ? `<div style="font-size:11px;color:#16a34a;padding:4px 0;">✅ Bu formda hata yok</div>`
        : hatalar.map(r => `<div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-bottom:1px solid #f3f4f6;">
            <span style="font-size:10px;font-weight:800;color:#dc2626;background:#fee2e2;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;">${r[0]||'—'}</span>
            <span style="font-size:11px;color:#374151;">${r[1]||''}</span>
            <span style="font-size:10px;color:#9ca3af;white-space:nowrap;flex-shrink:0;">${r[2]||''}</span>
          </div>`).join('');
      const bc = a.passRate===null?'#9ca3af':a.passRate>=90?'#16a34a':a.passRate>=70?'#d97706':'#dc2626';
      return `<div style="border:1px solid ${a.hata>0?'#fca5a5':'#e5e7eb'};border-radius:10px;margin-bottom:10px;overflow:hidden;">
        <div style="background:${a.hata>0?'#fff1f1':'#f9fafb'};padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer;" onclick="rpShowDetail('${f.id}')">
          <div style="flex:1;">
            <div style="font-size:12px;font-weight:800;color:#111827;">${f.name||'—'}</div>
            <div style="font-size:10px;color:#6b7280;margin-top:1px;">${f.modelLabel||'—'} &nbsp;·&nbsp; ${tarih}</div>
          </div>
          <span style="font-size:16px;font-weight:900;color:${bc};">${a.passRate!==null?'%'+a.passRate:'—'}</span>
          <span style="font-size:11px;font-weight:700;color:${a.hata>0?'#dc2626':'#16a34a'};">${a.hata>0?a.hata+' hata':'✓ Hatasız'}</span>
          <span style="font-size:10px;color:#9ca3af;">detay ▶</span>
        </div>
        ${hatalar.length > 0 ? `<div style="padding:8px 14px;">${hataHtml}</div>` : `<div style="padding:6px 14px;">${hataHtml}</div>`}
      </div>`;
    }).join('');

    document.getElementById('rp-mbox').innerHTML = `
      <div style="background:${rolRenk};color:#fff;padding:15px 18px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:14px;font-weight:800;">${isim}</div>
          <div style="font-size:11px;opacity:.8;margin-top:2px;">${rolLbl} · ${forms.length} form · toplam ${toplamHata} hata</div>
        </div>
        <button onclick="rpCloseModal()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      <div style="padding:14px 18px;max-height:70vh;overflow-y:auto;">${formBlocks}</div>`;
    document.getElementById('rp-modal').style.display = 'block';
  }

  function rpTabNotes(panel, filtered) {
    const items = [];
    filtered.forEach(f => {
      const d = new Date(f.savedAt||f.updatedAt);
      const tarih = d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
      const meta = `${tarih} · ${f.modelLabel||'—'} · ${f.name||'—'}`;
      (f.notes?.aksilikler||[]).forEach(t=>items.push({type:'a',txt:t,meta,d}));
      (f.notes?.revizeler||[]).forEach(t=>items.push({type:'r',txt:t,meta,d}));
    });
    items.sort((a,b)=>b.d-a.d);
    if (!items.length) { panel.innerHTML = '<div class="rp-empty">📝 Bu dönemde aksiliği veya revize önerisi olan form yok.</div>'; return; }
    panel.innerHTML = items.map(it=>`
      <div class="rp-ni ${it.type==='a'?'rp-ni-a':'rp-ni-r'}">
        <div class="rp-ni-m">${it.type==='a'?'⚠️ Aksilik':'🔧 Revize'} · ${it.meta}</div>
        <div>${it.txt}</div></div>`).join('');
  }

  function rpShowDetail(id) {
    const f = window._rpForms.find(x=>x.id===id); if (!f) return;
    const a = rpAnalyzeForm(f);
    const tarih = new Date(f.savedAt||f.updatedAt).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const trs = kfFormGetRows(f).filter(r=>r[6]===1&&r[0]).map(r => {
      const s=r[3]||'—'; const c=s==='HAYIR'?'#dc2626':s==='EVET'?'#16a34a':'#6b7280';
      return `<tr><td style="font-weight:600;color:#374151;white-space:nowrap;">${r[0]}</td><td>${r[1]||''}</td><td style="text-align:center;">${r[2]||''}</td><td style="text-align:center;font-weight:700;color:${c};">${s}</td></tr>`;
    }).join('');
    const pc2 = a.passRate===null?'#6b7280':a.passRate>=80?'#16a34a':a.passRate>=60?'#d97706':'#dc2626';
    const aks = (f.notes?.aksilikler||[]).map(t=>`<div style="padding:5px 10px;background:#fff1f1;border-radius:6px;margin-bottom:4px;font-size:12px;color:#991b1b;">⚠️ ${t}</div>`).join('');
    const rev = (f.notes?.revizeler||[]).map(t=>`<div style="padding:5px 10px;background:#eff6ff;border-radius:6px;margin-bottom:4px;font-size:12px;color:#1e40af;">🔧 ${t}</div>`).join('');
    const stats = [['%'+(a.passRate??'—'),'Geçme',pc2],[''+a.evet,'EVET','#16a34a'],[''+a.hata,'Hata',a.hata>0?'#dc2626':'#9ca3af'],[''+a.kd,'KD','#6b7280'],[a.kaynakci||'—','Kaynakçı','#374151'],[a.montajci||'—','Montajcı','#374151']]
      .map(([v,l,c])=>`<div style="background:#f9fafb;border-radius:8px;padding:8px 12px;flex:1;min-width:80px;text-align:center;"><div style="font-size:20px;font-weight:900;color:${c};">${v}</div><div style="font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;">${l}</div></div>`).join('');
    document.getElementById('rp-mbox').innerHTML = `
      <div style="background:#dc2626;color:#fff;padding:15px 18px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between;">
        <div><div style="font-size:14px;font-weight:800;">${f.name||'Form'}</div><div style="font-size:11px;opacity:.8;margin-top:2px;">${f.modelLabel||'—'} · ${tarih}</div></div>
        <button onclick="rpCloseModal()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      <div style="padding:14px 18px;">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">${stats}</div>
        ${aks||rev?`<div style="margin-bottom:12px;">${aks}${rev}</div>`:''}
        <div style="max-height:320px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:8px;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
            <thead style="position:sticky;top:0;background:#f9fafb;z-index:1;"><tr>
              <th style="padding:7px 10px;text-align:left;border-bottom:2px solid #e5e7eb;font-weight:700;white-space:nowrap;">KOD</th>
              <th style="padding:7px 10px;text-align:left;border-bottom:2px solid #e5e7eb;font-weight:700;">Açıklama</th>
              <th style="padding:7px 10px;text-align:center;border-bottom:2px solid #e5e7eb;font-weight:700;">Grup</th>
              <th style="padding:7px 10px;text-align:center;border-bottom:2px solid #e5e7eb;font-weight:700;">Sonuç</th>
            </tr></thead>
            <tbody>${trs}</tbody>
          </table>
        </div>
      </div>`;
    document.getElementById('rp-modal').style.display = 'block';
  }

  function rpCloseModal() { const m=document.getElementById('rp-modal'); if(m) m.style.display='none'; }

  function rpSetPeriod(p) {
    window._rpFilters.period = p;
    document.querySelectorAll('.rp-pb').forEach(b => b.classList.toggle('on', b.getAttribute('onclick') === `rpSetPeriod('${p}')`) );
    rpRefresh();
  }
  function rpSetModel(v)     { window._rpFilters.modelId  = v; rpRefresh(); }
  function rpSetKaynakci(v)  { window._rpFilters.kaynakci = v; rpRefresh(); }
  function rpSetMontajci(v)  { window._rpFilters.montajci = v; rpRefresh(); }
  function rpSetTab(t) {
    window._rpActiveTab = t;
    document.querySelectorAll('.rp-tab').forEach(b => b.classList.toggle('on', b.getAttribute('onclick') === `rpSetTab('${t}')`) );
    rpRenderTab(rpApplyFilters(window._rpForms));
  }

  function rpExportExcel() {
    const filtered = rpApplyFilters(window._rpForms);
    if (!filtered.length) { kfToast('Dışa aktarılacak form yok.'); return; }
    const rows = [['Tarih','Model','Form Adı / Seri No','Kaynakçı','Montajcı','Geçme %','EVET','Hata (HAYIR)','KD','Toplam T Param.','Aksilik Sayısı','Revize Sayısı']];
    [...filtered].sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt)).forEach(f => {
      const a = rpAnalyzeForm(f);
      rows.push([new Date(f.savedAt||f.updatedAt).toLocaleDateString('tr-TR'),
        f.modelLabel||'', f.name||'', a.kaynakci, a.montajci,
        a.passRate!==null?'%'+a.passRate:'',
        a.evet, a.hata, a.kd, a.total,
        (f.notes?.aksilikler||[]).length, (f.notes?.revizeler||[]).length]);
    });
    const csv = '\uFEFF' + rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\r\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download = 'KaliteX_Rapor_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(a.href);
  }

  function rpExportPDF() { window.print(); }

  applyConfig(defaultConfig);
  lucide.createIcons();

  // ── Uygulama başlatma: site direk açılır, editör session/OAuth kontrol edilir ─
  (async () => {
    authCheckSession();          // localStorage'dan editör oturumu yükle
    await authCheckCallback();  // Google OAuth geri dönüşü varsa işle
    const app = document.getElementById('app');
    app.style.removeProperty('display');
    app.style.display = 'flex';
    authUpdateUI();              // header butonlarını ayarla
    await khInit();
    kfNotesWireEvents();
    renderPage(currentPage);
    lucide.createIcons();
  })();

  // ── PWA: Service Worker kaydı ──────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          console.log('[KaliteX] Service Worker aktif:', reg.scope);
          if ('sync' in reg) {
            reg.sync.register('sync-forms').catch(() => {});
          }
        })
        .catch(err => console.warn('[KaliteX] SW kaydı başarısız:', err));
    });

    // Yeni SW devreye girince (yani yeni kod deploy edilince) sayfayı otomatik yenile
    // Böylece tablette eski JS çalışmaya devam etmez
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!_kfSavingToCloud && !_khSyncing) {
        console.log('[KaliteX] Yeni Service Worker aktif, sayfa yenileniyor...');
        window.location.reload();
      }
    });
  }
</script>
</body>
