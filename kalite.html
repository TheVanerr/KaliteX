      // Model atamaları — sil + yeniden ekle
      await sbDel('model_atama', 'model_id=not.is.null');
      const atamaRows = [];
      for (const [mid, obj] of Object.entries(KH.assignments))

      for (let i = 0; i < atamaRows.length; i += 500)

  function khImportCSV() {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.csv,.txt';
    inp.onchange = () => {
      const f = inp.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = e => {
        try {
          const text = e.target.result;
          const allLines = text.split(/\r?\n/);
          // Başlık satırını bul (KOD ile başlayanı ara)
          let headerIdx = -1;
          for (let i = 0; i < Math.min(5, allLines.length); i++) {
            if (allLines[i].split(';')[0].trim().toUpperCase() === 'KOD') { headerIdx = i; break; }
          }
          if (headerIdx < 0) { alert('Başlık satırı (KOD) bulunamadı.'); return; }
          const headers = allLines[headerIdx].split(';').map(h => h.trim());
          // Model sütun indekslerini belirle
          const modelCols = {}; // colIdx -> mid
          headers.forEach((h, ci) => { if (KH_CSV_MAP[h]) modelCols[ci] = KH_CSV_MAP[h]; });
          // Veriyi sıfırla
          KH.paramData = [];
          KH_MODELS.forEach(m => { KH.assignments[m.id] = {}; });
          KH.TOTAL_ROWS = 500;
          for (let r = 0; r < KH.TOTAL_ROWS; r++) KH.paramData.push(new Array(KH_FIXED.length).fill(''));
          // Satırları parse et
          let rowIdx = 0;
          for (let li = headerIdx + 1; li < allLines.length && rowIdx < KH.TOTAL_ROWS; li++) {
            const ln = allLines[li];
            if (!ln.trim()) continue;
            const cols = ln.split(';');
            const kod = cols[0] ? cols[0].trim() : '';
            if (!kod || !kod.match(/^K\d/)) continue;
            KH.paramData[rowIdx][0] = kod;
            KH.paramData[rowIdx][1] = cols[1] ? cols[1].trim() : '';
            KH.paramData[rowIdx][2] = cols[2] ? cols[2].trim() : '';
            KH.paramData[rowIdx][3] = cols[3] ? cols[3].trim() : '';
            KH.paramData[rowIdx][4] = cols[4] ? cols[4].trim() : '';
            KH.paramData[rowIdx][5] = cols[5] ? cols[5].trim() : '';
            KH.paramData[rowIdx][6] = cols[6] ? cols[6].trim() : '';
            // Model atamaları
            Object.entries(modelCols).forEach(([ci, mid]) => {
              const v = cols[ci] ? cols[ci].trim().toUpperCase() : '';
              if (v === 'X') KH.assignments[mid][rowIdx] = 'X';
            });
            rowIdx++;
          }
          khBuildFR(); khVSR(); khSave();
          khToast(`CSV yüklendi: ${rowIdx} parametre ✓`, 2500);
        } catch(err) { alert('CSV okuma hatası: ' + err.message); }
      };
      rd.readAsText(f, 'UTF-8');
    };
    inp.click();
  }

  // ── Filtered rows ────────────────────────────────────────────
  function khBuildFR() {
    const rows = [];
    for (let r = 0; r < KH.TOTAL_ROWS; r++) {
      let ok = true;
      for (const [ci, val] of Object.entries(KH.filters)) {
        if (!val) continue;
        const c = parseInt(ci);
        const cv = c < KH_FIXED.length ? (KH.paramData[r][c] || '') : khMVal(KH_MODELS[c - KH_FIXED.length].id, r);
        if (!cv.toLowerCase().includes(val.toLowerCase())) { ok = false; break; }
      }
      if (ok) rows.push(r);
    }
    if (KH.sortState.col >= 0) {
      const sc = KH.sortState.col;
      rows.sort((a, b) => {
        let av, bv;
        if (sc < KH_FIXED.length) { av = (KH.paramData[a][sc]||'').toLowerCase(); bv = (KH.paramData[b][sc]||'').toLowerCase(); }
        else { const mid = KH_MODELS[sc - KH_FIXED.length].id; av = khMVal(mid, a).toLowerCase(); bv = khMVal(mid, b).toLowerCase(); }
        return KH.sortState.asc ? av.localeCompare(bv,'tr') : bv.localeCompare(av,'tr');
      });
    }
    KH.filteredRows = rows;
  }

  // ── Virtual scroll ───────────────────────────────────────────
  function khOnScroll() {
    const w = document.getElementById('kh-scroll'); if (!w) return;
    const st = w.scrollTop, vh = w.clientHeight;
    const start = Math.max(0, Math.floor(st / KH.ROW_H) - KH.BUFFER);
    const end = Math.min(KH.filteredRows.length - 1, Math.ceil((st + vh) / KH.ROW_H) + KH.BUFFER);
    if (start === KH.vsStart && end === KH.vsEnd) return;
    KH.vsStart = start; KH.vsEnd = end;
    khVSR();
  }

  function khVSR() {
    const tot = KH.filteredRows.length;
    const colSpan = khTC() + 2;
    const topH = KH.vsStart * KH.ROW_H;
    const botH = Math.max(0, (tot - KH.vsEnd - 1)) * KH.ROW_H;
    const { r1, c1, r2, c2 } = KH.sel;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);

    let html = `<tr><td colspan="${colSpan}" style="height:${topH}px;padding:0;border:none;"></td></tr>`;
    for (let vi = KH.vsStart; vi <= KH.vsEnd && vi < tot; vi++) {
      const ri = KH.filteredRows[vi];
      const rSel = KH.showSel && r1 >= 0 && ri >= minR && ri <= maxR;
      html += `<tr class="khr${rSel?' khra':''}" data-ri="${ri}">`;
      html += `<td class="khrn khrn-fr${rSel?' khrns':''}" data-ri="${ri}" onmousedown="khRND(event,${ri})">${ri+1}</td>`;
      for (let ci = 0; ci < KH_FIXED.length; ci++) {
        const v = KH.paramData[ri][ci] || '';
        const s = rSel && ci >= minC && ci <= maxC;
        const w5 = ci === 4 ? ' style="min-width:270px;"' : '';
        const ctr = (ci === 0 || ci === 1) ? ' khcv-c' : '';
        html += `<td class="khc${s?' khs':''}" data-ri="${ri}" data-ci="${ci}" onmousedown="khCD(event,${ri},${ci})" onmouseover="khCO(event,${ri},${ci})" ondblclick="khDD(event,${ri},${ci})"${w5}><div class="khcv${ctr}">${khEsc(v)}</div></td>`;
      }
      for (let mi = 0; mi < KH_MODELS.length; mi++) {
        const ci = KH_FIXED.length + mi;
        const xv = khMVal(KH_MODELS[mi].id, ri);
        const xs = rSel && ci >= minC && ci <= maxC;
        html += `<td class="khc${xs?' khs':''}" data-ri="${ri}" data-ci="${ci}" onmousedown="khCD(event,${ri},${ci})" onmouseover="khCO(event,${ri},${ci})" ondblclick="khDD(event,${ri},${ci})"><div class="khcv khcv-c">${khEsc(xv)}</div></td>`;
      }
      html += `<td style="min-width:30px;border:none;"></td></tr>`;
    }
    html += `<tr><td colspan="${colSpan}" style="height:${botH}px;padding:0;border:none;"></td></tr>`;
    document.getElementById('kh-tbody').innerHTML = html;
    const el = document.getElementById('kh-sc'); if (el) el.textContent = `${tot} / ${KH.TOTAL_ROWS} satır`;
  }

  // ── Header ───────────────────────────────────────────────────
  function khBuildHeader() {
    const ss = KH.sortState;
    // Fixed column min-widths (px) so label fits single line
    const fixedW = [80, 100, 90, 85, 270, 70, 90]; // KOD,ALAN TÜRÜ,UZUNLUK,DESİMAL,AÇIKLAMA,GRUP,GRUP KODU
    let h = `<tr>`;
    h += `<th class="khth khth-fr" style="z-index:22;">#</th>`;
    KH_FIXED.forEach((col, ci) => {
      const sorted = ss.col === ci;
      const fActive = !!KH.filters[ci];
      h += `<th class="khth" data-ci="${ci}" style="min-width:${fixedW[ci]}px;"><div class="khth-inner">`;
      h += `<span style="white-space:nowrap;">${col}</span>`;
      h += `<button class="khsb" onclick="khTS(${ci})" title="Sırala">${sorted?(ss.asc?'▲':'▼'):'⇅'}</button>`;
      h += `<button class="khfb${fActive?' khfb-on':''}" onclick="khOpenFilter(${ci})" title="Filtrele">▼</button>`;
      h += `</div></th>`;
    });
    KH_MODELS.forEach((m, mi) => {
      const ci = KH_FIXED.length + mi;
      const sorted = ss.col === ci;
      h += `<th class="khth khxth" data-ci="${ci}"><div class="khth-inner"><span style="white-space:nowrap;">${m.label}</span><button class="khsb" onclick="khTS(${ci})" title="Sırala">${sorted?(ss.asc?'▲':'▼'):'⇅'}</button></div></th>`;
    });
    h += `<th class="khth" style="min-width:30px;border:none;background:#dc2626;"></th></tr>`;
    document.getElementById('kh-thead').innerHTML = h;
  }

  // ── Full render ──────────────────────────────────────────────
  async function khRenderPage() {
    await khInit();
    khBuildFR();
    KH.vsStart = 0; KH.vsEnd = 60;
    const w = document.getElementById('kh-scroll');
    if (w) w.scrollTop = 0;

  // (X toggle removed — model columns are now plain text cells)

  // ── Selection ────────────────────────────────────────────────
  function khCD(e, ri, ci) {
    if (e.button !== 0) return;
    khCE(); KH.mousedown = true; KH.showSel = true;
    if (e.shiftKey && KH.sel.r1 >= 0) { KH.sel.r2 = ri; KH.sel.c2 = ci; }
    else KH.sel = { r1: ri, c1: ci, r2: ri, c2: ci };
    khSelUI();
    e.preventDefault();
  }

  function khCO(e, ri, ci) {
    if (!KH.mousedown) return;
    KH.sel.r2 = ri; KH.sel.c2 = ci;
    KH.showSel = true;
    khSelUI();
  }

  function khRND(e, ri) {
    khCE(); KH.showSel = true; KH.sel = { r1: ri, c1: 0, r2: ri, c2: khTC() - 1 };
    khSelUI(); e.preventDefault();
  }

  function khSelUI() {
    if (!KH.showSel) return;
    const { r1, c1, r2, c2 } = KH.sel; if (r1 < 0) return;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    document.querySelectorAll('.khc').forEach(td => {
      const ri = +td.dataset.ri, ci = +td.dataset.ci;
      td.classList.toggle('khs', ri >= minR && ri <= maxR && ci >= minC && ci <= maxC);
    });
    document.querySelectorAll('.khrn').forEach(td => {
      td.classList.toggle('khrns', +td.dataset.ri >= minR && +td.dataset.ri <= maxR);
    });
    document.querySelectorAll('.khr').forEach(tr => {
      tr.classList.toggle('khra', +tr.dataset.ri >= minR && +tr.dataset.ri <= maxR);
    });
  }

  // ── Edit ─────────────────────────────────────────────────────
  function khDD(e, ri, ci) {
    khCE();
    const cell = e.currentTarget;
    const val = ci < KH_FIXED.length ? (KH.paramData[ri][ci] || '') : khMVal(KH_MODELS[ci - KH_FIXED.length].id, ri);
    KH.editCell = { ri, ci, el: cell };
    cell.innerHTML = `<input class="khei" type="text" value="${khEsc(val)}">`;    
    KH.editEl = cell.querySelector('input');
    KH.editEl.focus(); KH.editEl.select();
    KH.editEl.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') { khCE(); ev.preventDefault(); }
      if (ev.key === 'Escape') { khCA(); ev.preventDefault(); }
      if (ev.key === 'Tab') {
        khCE();
        const nc = ci + (ev.shiftKey ? -1 : 1);
        if (nc >= 0 && nc < khTC()) setTimeout(() => {
          const n = document.querySelector(`.khc[data-ri="${ri}"][data-ci="${nc}"]`);
          if (n) khDD({ currentTarget: n, stopPropagation: () => {} }, ri, nc);
        }, 10);
        ev.preventDefault();
      }
    });
    KH.editEl.addEventListener('blur', () => setTimeout(khCE, 80));
    e.stopPropagation();
  }

  function khCE() {
    if (!KH.editCell || !KH.editEl) return;
    const { ri, ci, el } = KH.editCell;
    const v = KH.editEl.value;
    if (ci < KH_FIXED.length) KH.paramData[ri][ci] = v;
    else khMValSet(KH_MODELS[ci - KH_FIXED.length].id, ri, v);
    el.innerHTML = `<div class="khcv">${khEsc(v)}</div>`;
    KH.editCell = null; KH.editEl = null; KH._dirty = true;
  }

  function khCA() {
    if (!KH.editCell) return;
    const { ri, ci, el } = KH.editCell;
    const v = ci < KH_FIXED.length ? (KH.paramData[ri][ci]||'') : khMVal(KH_MODELS[ci - KH_FIXED.length].id, ri);
    el.innerHTML = `<div class="khcv">${khEsc(v)}</div>`;
    KH.editCell = null; KH.editEl = null;
  }

  // ── Copy / Cut / Paste ───────────────────────────────────────
  function khCopy() {
    const { r1, c1, r2, c2 } = KH.sel; if (r1 < 0) return;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    const rows = [];
    for (let r = minR; r <= maxR; r++) {
      const row = [];
      for (let c = minC; c <= maxC; c++) {
        row.push(c < KH_FIXED.length ? (KH.paramData[r][c]||'') : khMVal(KH_MODELS[c - KH_FIXED.length].id, r));
      }
      rows.push(row);
    }
    KH.clipboard = { data: rows };
    navigator.clipboard.writeText(rows.map(r => r.join('\t')).join('\n')).catch(() => {});
    khToast(`${(maxR-minR+1)*(maxC-minC+1)} hücre kopyalandı`);
  }

  function khPaste() {
    const doIt = rows => {
      if (KH.sel.r1 < 0) return;
      const sR = Math.min(KH.sel.r1, KH.sel.r2), sC = Math.min(KH.sel.c1, KH.sel.c2);
      rows.forEach((row, ri) => row.forEach((val, ci) => {
        const tr = sR + ri, tc = sC + ci;
        if (tr >= KH.TOTAL_ROWS || tc >= khTC()) return;
        if (tc < KH_FIXED.length) { KH.paramData[tr][tc] = val; }
        else { khMValSet(KH_MODELS[tc - KH_FIXED.length].id, tr, val); }
      }));
      KH._dirty = true; khVSR(); khToast('Yapıştırıldı');
    };
    if (KH.clipboard) { doIt(KH.clipboard.data); return; }
    navigator.clipboard.readText().then(t => { if (t) doIt(t.split('\n').map(r => r.split('\t'))); }).catch(() => {});
  }

  function khCut() {
    khCopy();
    const { r1, c1, r2, c2 } = KH.sel;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    for (let r = minR; r <= maxR; r++) for (let c = minC; c <= maxC; c++) {
      if (c < KH_FIXED.length) KH.paramData[r][c] = '';
      else khMValSet(KH_MODELS[c - KH_FIXED.length].id, r, '');
    }
    KH._dirty = true; khVSR();
  }

  function khDel() {
    const { r1, c1, r2, c2 } = KH.sel; if (r1 < 0) return;
    const minR = Math.min(r1,r2), maxR = Math.max(r1,r2);
    const minC = Math.min(c1,c2), maxC = Math.max(c1,c2);
    for (let r = minR; r <= maxR; r++) for (let c = minC; c <= maxC; c++) {
      if (c < KH_FIXED.length) KH.paramData[r][c] = '';
      else khMValSet(KH_MODELS[c - KH_FIXED.length].id, r, '');
    }
    KH._dirty = true; khVSR();
  }

  function khSelAll() { KH.showSel = true; KH.sel = { r1: 0, c1: 0, r2: KH.TOTAL_ROWS-1, c2: khTC()-1 }; khSelUI(); }

  // ── Filter / Sort ─────────────────────────────────────────────
  function khSF(ci, val) {
    if (val) KH.filters[ci] = val; else delete KH.filters[ci];
    KH.sel = { r1:-1, c1:-1, r2:-1, c2:-1 };
    khBuildFR(); KH.vsStart = 0; KH.vsEnd = 60;
    const w = document.getElementById('kh-scroll'); if (w) w.scrollTop = 0;
    khBuildHeader(); khVSR();
  }

  // ── Filter modal ────────────────────────────────────
  function khOpenFilter(ci) {
    const overlay = document.getElementById('kh-filter-modal');
    const colName = ci < KH_FIXED.length ? KH_FIXED[ci] : KH_MODELS[ci - KH_FIXED.length].label;
    const cur = KH.filters[ci] || '';
    overlay.innerHTML = `<div class="khfm-box" onclick="event.stopPropagation()">
      <div class="khfm-title">Filtre — ${colName}</div>
      <input id="khfm-inp" class="khfm-input" type="text" placeholder="Filtre değeri girin..." value="${khEsc(cur)}" autofocus>
      <div class="khfm-btns">
        <button class="khfm-clear" onclick="khClearFilter(${ci})">Temizle</button>
        <button class="khfm-ok" onclick="khApplyFilter(${ci})">Uygula</button>
      </div>
    </div>`;
    overlay.style.display = 'flex';
    setTimeout(() => { const inp = document.getElementById('khfm-inp'); if (inp) { inp.focus(); inp.select(); inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') khApplyFilter(ci); if (ev.key === 'Escape') khCloseFilter(); }); } }, 30);
  }

  function khApplyFilter(ci) {
    const inp = document.getElementById('khfm-inp');
    if (inp) khSF(ci, inp.value.trim());
    khCloseFilter();
  }

  function khClearFilter(ci) {
    khSF(ci, '');
    khCloseFilter();
  }

  function khCloseFilter() {
    const overlay = document.getElementById('kh-filter-modal');
    if (overlay) { overlay.style.display = 'none'; overlay.innerHTML = ''; }
  }

  function khTS(ci) {
    if (KH.sortState.col === ci) KH.sortState.asc = !KH.sortState.asc;
    else { KH.sortState.col = ci; KH.sortState.asc = true; }
    khBuildFR(); khBuildHeader(); khVSR();
  }

  // ── Add row (insert above selected row) ────────────────────
  function khAddRow() {
    if (KH.sel.r1 < 0) {
      khToast('Önce bir satır seçin — yeni satır seçili satırın üstüne eklenir', 3000);
      return;
    }
    const insertAt = Math.min(KH.sel.r1, KH.sel.r2);
    KH.TOTAL_ROWS++;
    KH.paramData.splice(insertAt, 0, new Array(KH_FIXED.length).fill(''));
    // Shift assignment row indices for rows at or after insertAt
    for (const [mid, obj] of Object.entries(KH.assignments)) {
      const newObj = {};
      for (const [ri, v] of Object.entries(obj)) {
        const n = +ri;
        newObj[n >= insertAt ? n + 1 : n] = v;
      }
      KH.assignments[mid] = newObj;
    }
    KH.sel = { r1: insertAt, c1: KH.sel.c1, r2: insertAt, c2: KH.sel.c2 };
    khBuildFR(); khVSR();
    khScrollTo(insertAt);
    khToast('Satır eklendi ✓');
  }

  // ── Scroll cell into view ─────────────────────────────────────
  function khScrollTo(ri) {
    const w = document.getElementById('kh-scroll'); if (!w) return;
    const top = ri * KH.ROW_H;
    if (top < w.scrollTop) w.scrollTop = top;
    else if (top + KH.ROW_H > w.scrollTop + w.clientHeight) w.scrollTop = top + KH.ROW_H - w.clientHeight;
  }

  // ── Keyboard ─────────────────────────────────────────────────
  function khKeyDown(e) {
    if (currentPage !== 'kalite-havuzu') return;
    // Close filter modal on Escape
    const modal = document.getElementById('kh-filter-modal');
    if (modal && modal.style.display !== 'none') { if (e.key === 'Escape') khCloseFilter(); return; }
    // Don't intercept keystrokes typed into filter inputs or other non-edit inputs
    const ae = document.activeElement;
    if (ae && ae !== KH.editEl && (ae.tagName === 'INPUT' || ae.tagName === 'SELECT' || ae.tagName === 'TEXTAREA')) return;
    if (KH.editCell) return;
    const cmd = e.ctrlKey || e.metaKey;
    if (cmd && e.key === 'c') { khCopy(); e.preventDefault(); return; }
    if (cmd && e.key === 'v') { khPaste(); e.preventDefault(); return; }
    if (cmd && e.key === 'x') { khCut(); e.preventDefault(); return; }
    if (cmd && e.key === 'a') { khSelAll(); e.preventDefault(); return; }
    if (cmd && e.key === 's') { khSave(); e.preventDefault(); return; }
    if (e.key === 'F2' && KH.sel.r1 >= 0 && KH.sel.r1 === KH.sel.r2 && KH.sel.c1 === KH.sel.c2) {
      const cell = document.querySelector(`.khc[data-ri="${KH.sel.r1}"][data-ci="${KH.sel.c1}"]`);
      if (cell) { khDD({ currentTarget: cell, stopPropagation: () => {} }, KH.sel.r1, KH.sel.c1); }
      e.preventDefault(); return;
    }
    if (e.key === 'Delete' || e.key === 'Backspace') { if (KH.sel.r1 >= 0) { khDel(); e.preventDefault(); } return; }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      const s = KH.sel; if (s.r1 < 0) return;
      let r = s.r1, c = s.c1;
      if (e.key === 'ArrowUp') r = Math.max(0, r-1);
      if (e.key === 'ArrowDown') r = Math.min(KH.TOTAL_ROWS-1, r+1);
      if (e.key === 'ArrowLeft') c = Math.max(0, c-1);
      if (e.key === 'ArrowRight') c = Math.min(khTC()-1, c+1);
      if (e.shiftKey) { KH.sel.r2 = r; KH.sel.c2 = c; } else KH.sel = { r1:r, c1:c, r2:r, c2:c };
      KH.showSel = true;
      khScrollTo(r); khSelUI(); e.preventDefault(); return;
    }
    if (!cmd && e.key.length === 1 && KH.sel.r1 >= 0 && KH.sel.r1 === KH.sel.r2 && KH.sel.c1 === KH.sel.c2) {
      const { r1: selR, c1: selC } = KH.sel;
      const cell = document.querySelector(`.khc[data-ri="${selR}"][data-ci="${selC}"]`);
      if (cell) {
        if (selC < KH_FIXED.length) KH.paramData[selR][selC] = '';
        else khMValSet(KH_MODELS[selC - KH_FIXED.length].id, selR, '');
        const k = e.key;
        khDD({ currentTarget: cell, stopPropagation: () => {} }, selR, selC);
        setTimeout(() => { if (KH.editEl) { KH.editEl.value = k; KH.editEl.setSelectionRange(1,1); } }, 0);
      }
    }
  }

  // ── Auth (Supabase) ────────────────────────────────────────────────────────
  function splashClick() {
    const m = document.getElementById('auth-modal');
    m.style.display = 'flex';
    setTimeout(() => document.getElementById('auth-email').focus(), 100);
  }

  async function authSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('auth-btn');
    const err = document.getElementById('auth-err');
    const email = document.getElementById('auth-email').value.trim();
    const pass  = document.getElementById('auth-pass').value;
    btn.textContent = 'Giriş yapılıyor...'; btn.disabled = true; err.style.display = 'none';
    try {
      const res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || 'Giriş başarısız');
      // Oturum aç
      SB_TOKEN = data.access_token;
      const userName = data.user?.email?.split('@')[0] || data.user?.email || 'Kullanıcı';
      // Session'ı localStorage'a kaydet (sayfa yenilemede kaybolmasın)
      localStorage.setItem('kx_session', JSON.stringify({
        access_token: data.access_token,
        email: data.user?.email || '',
        user_name: userName,
        expires_at: Math.floor(Date.now() / 1000) + (data.expires_in || 3600)
      }));
      authShowApp(userName);
    } catch(ex) {
      err.textContent = ex.message; err.style.display = 'block';
    } finally {
      btn.textContent = 'Giriş Yap'; btn.disabled = false;
    }
  }

  function authSignOut() {
    SB_TOKEN = null;
    localStorage.removeItem('kx_session');
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-modal').style.display = 'none';
    document.getElementById('splash').style.display = 'flex';
    document.getElementById('auth-pass').value = '';
    document.getElementById('auth-err').style.display = 'none';
    KH._ready = false;
  }

  async function authShowApp(userName) {
    document.getElementById('header-user').textContent = userName;
    document.getElementById('auth-modal').style.display = 'none';
    document.getElementById('splash').style.display = 'none';
    const app = document.getElementById('app');
    app.style.removeProperty('display');
    app.style.display = 'flex';
    lucide.createIcons();
    await khInit(); khBuildHeader(); khBuildFR(); khVSR();
    renderPage(currentPage);
  }

  // ── Sayfa açılınca kaydedilmiş session kontrolü ─────────────────────────────
  (async () => {
    try {
      const raw = localStorage.getItem('kx_session');
      if (raw) {
        const session = JSON.parse(raw);
        const now = Math.floor(Date.now() / 1000);
        if (session.access_token && session.expires_at > now) {
          // Geçerli session var — login ekranını atla
          SB_TOKEN = session.access_token;
          await authShowApp(session.user_name || session.email?.split('@')[0] || 'Kullanıcı');

        })
