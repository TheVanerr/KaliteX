name: Supabase Keep-Alive

on:
  schedule:
    # Her 6 saatte bir çalışır (UTC): 00:00, 06:00, 12:00, 18:00
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manuel tetikleme için

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Supabase'e ping at
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/sync_lock?select=data_version&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase aktif ve yanıt veriyor."
          else
            echo "❌ Supabase yanıt vermedi! Status: $STATUS"
            exit 1
          fi

      - name: Workflow'u gerekirse canlı tut
        env:
          KEEPALIVE_THRESHOLD_DAYS: '55'
        run: |
          latest_commit_ts=$(git log -1 --format=%ct)
          now_ts=$(date +%s)
          age_days=$(( (now_ts - latest_commit_ts) / 86400 ))

          echo "Latest commit age: ${age_days} days"

          if [ "$age_days" -lt "$KEEPALIVE_THRESHOLD_DAYS" ]; then
            echo "Repository activity is recent enough. No keep-alive commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive ping [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
