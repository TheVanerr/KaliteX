name: Supabase Keep-Alive

on:
  schedule:
    # Her 6 saatte bir çalışır (UTC): 00:00, 06:00, 12:00, 18:00
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Supabase'e ping at
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/sync_lock?select=data_version&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase aktif ve yanıt veriyor."
          else
            echo "❌ Supabase yanıt vermedi! Status: $STATUS"
            exit 1
          fi

      - name: Workflow'u canlı tut (60 gün sınırını sıfırla)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive ping [skip ci]"
          git push
